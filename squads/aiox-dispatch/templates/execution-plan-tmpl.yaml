# ═══════════════════════════════════════════════════════════════════════════════
# TEMPLATE: Execution Plan v1.0.0
# Purpose: Structure for decomposed dispatch work (Phase 1 output)
# Generated by: wave-planner (Reinertsen + Goldratt)
# Input: Story/PRD/task list → atomic tasks with dependencies
# Output: execution-plan.yaml (per run)
# Used in: wf-story-dispatch.yaml Phase 1 → Phase 2 → Phase 3
# ═══════════════════════════════════════════════════════════════════════════════

template:
  id: dispatch-execution-plan
  name: "Dispatch Execution Plan"
  version: "1.0.0"
  output:
    format: yaml
    filename: "execution-plan.yaml"
    location: "_temp/dispatch/runs/{{run_id}}/"

# ═══════════════════════════════════════════════════════════════════════════════
# VARIABLES
# ═══════════════════════════════════════════════════════════════════════════════

variables:
  required:
    - run_id: "Dispatch run ID (dispatch-YYYYMMDD-HHMMSS)"
    - input_type: "story | prd | free_text | batch"
    - description: "Original work description"
    - tasks: "Array of decomposed atomic tasks"
  optional:
    - input_path: "Path to story/PRD file"
    - story_acceptance: "Original story acceptance criteria"

# ═══════════════════════════════════════════════════════════════════════════════
# OUTPUT STRUCTURE
# ═══════════════════════════════════════════════════════════════════════════════

structure: |
  # Dispatch Execution Plan
  # Run: {{run_id}}
  # Generated: {{timestamp}}

  meta:
    run_id: "{{run_id}}"
    input_type: "{{input_type}}"
    input_path: "{{input_path}}"
    description: "{{description}}"
    generated_at: "{{timestamp}}"
    total_tasks: {{total_tasks}}
    estimated_cost_usd: {{estimated_cost}}
    estimated_duration_min: {{estimated_duration}}

  # Original acceptance criteria (from story/PRD)
  story_acceptance:
    {{#each story_acceptance}}
    - criterion: "{{this.criterion}}"
      measurable: {{this.measurable}}  # true/false — V1.2 check
      maps_to_tasks: [{{this.task_ids}}]
    {{/each}}

  # ═══════════════════════════════════════════════════════════════════════════
  # DECOMPOSED TASKS
  # Each task is ATOMIC: 1 task = 1 deliverable = 1 agent
  # ═══════════════════════════════════════════════════════════════════════════

  tasks:
    {{#each tasks}}
    - task_id: "{{this.task_id}}"  # T001, T002, ...
      description: "{{this.description}}"
      deliverable: "{{this.deliverable}}"  # What this task produces

      # ROUTING (filled by task-router in Phase 2)
      domain: "{{this.domain}}"  # From domain-registry.yaml
      agent: "{{this.agent}}"    # Slash command path (/copy:tasks:create-sales-page)
      model: "{{this.model}}"    # haiku | sonnet | worker
      executor_type: "{{this.executor_type}}"  # Worker | Agent | Hybrid
      enrichment: "{{this.enrichment}}"  # MINIMAL | STANDARD | FULL

      # OUTPUT
      output_path: "{{this.output_path}}"
      output_format: "{{this.output_format}}"  # yaml | json | markdown | code

      # DEPENDENCIES (for DAG)
      depends_on: [{{this.depends_on}}]  # Task IDs this depends on
      blocks: [{{this.blocks}}]          # Task IDs that depend on this

      # ACCEPTANCE (must be OPERATIONAL — measurable, binary)
      acceptance_criteria:
        {{#each this.acceptance_criteria}}
        - "{{this}}"
        {{/each}}

      # ESTIMATION
      estimated_tokens_in: {{this.estimated_tokens_in}}
      estimated_tokens_out: {{this.estimated_tokens_out}}
      estimated_cost_usd: {{this.estimated_cost_usd}}
      timeout: {{this.timeout}}  # From timeout-rules.yaml
    {{/each}}

  # ═══════════════════════════════════════════════════════════════════════════
  # DOMAIN SUMMARY
  # ═══════════════════════════════════════════════════════════════════════════

  domain_summary:
    {{#each domains}}
    - domain: "{{this.name}}"
      task_count: {{this.count}}
      primary_agent: "{{this.agent}}"
      enrichment: "{{this.enrichment}}"
      kb_files:
        {{#each this.kb_files}}
        - "{{this}}"
        {{/each}}
    {{/each}}

  # ═══════════════════════════════════════════════════════════════════════════
  # MODEL DISTRIBUTION
  # ═══════════════════════════════════════════════════════════════════════════

  model_distribution:
    worker: {{worker_count}}
    haiku: {{haiku_count}}
    sonnet: {{sonnet_count}}
    total: {{total_tasks}}

# ═══════════════════════════════════════════════════════════════════════════════
# VALIDATION RULES
# Applied by quality-gate at Phase 4.5
# ═══════════════════════════════════════════════════════════════════════════════

validation:
  - rule: "Every task has output_path (V1.1)"
  - rule: "Every acceptance criterion is measurable (V1.2)"
  - rule: "No placeholders [XXX], {TODO}, TBD (V1.3)"
  - rule: "Every task has model assigned (V1.10)"
  - rule: "Every task has agent assigned or is Worker (V1.11)"
  - rule: "Every task has timeout assigned (V1.8)"
  - rule: "1 task = 1 deliverable (V1.7)"
