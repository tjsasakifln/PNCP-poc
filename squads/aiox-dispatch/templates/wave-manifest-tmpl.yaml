# ═══════════════════════════════════════════════════════════════════════════════
# TEMPLATE: Wave Manifest v1.0.0
# Purpose: DAG-optimized wave structure (Phase 3 output)
# Generated by: wave-planner (Reinertsen + Goldratt)
# Input: execution-plan.yaml (with dependencies)
# Output: wave-manifest.yaml (per run)
# Used in: wf-story-dispatch.yaml Phase 3 → Phase 4 → Phase 5
# ═══════════════════════════════════════════════════════════════════════════════

template:
  id: dispatch-wave-manifest
  name: "Wave Manifest"
  version: "1.0.0"
  output:
    format: yaml
    filename: "wave-manifest.yaml"
    location: "_temp/dispatch/runs/{{run_id}}/"

# ═══════════════════════════════════════════════════════════════════════════════
# VARIABLES
# ═══════════════════════════════════════════════════════════════════════════════

variables:
  required:
    - run_id: "Dispatch run ID"
    - waves: "Array of optimized waves from DAG sort"
    - critical_path: "Longest dependency chain"
  optional:
    - max_parallel: "Override for max parallel tasks per wave (default: 7)"

# ═══════════════════════════════════════════════════════════════════════════════
# OUTPUT STRUCTURE
# ═══════════════════════════════════════════════════════════════════════════════

structure: |
  # Wave Manifest — DAG-Optimized Execution Order
  # Run: {{run_id}}
  # Generated: {{timestamp}}
  # Optimizer: wave-optimizer.py (Kahn's algorithm)

  meta:
    run_id: "{{run_id}}"
    total_waves: {{total_waves}}
    total_tasks: {{total_tasks}}
    max_parallel: {{max_parallel}}  # From rate_limits.per_wave_budget.max_tasks
    critical_path_length: {{critical_path_length}}
    optimization_ratio: "{{total_tasks}} tasks → {{total_waves}} waves ({{optimization_pct}}% reduction)"
    generated_at: "{{timestamp}}"

  # ═══════════════════════════════════════════════════════════════════════════
  # CRITICAL PATH
  # Longest chain of dependent tasks (Goldratt: constraint determines pace)
  # ═══════════════════════════════════════════════════════════════════════════

  critical_path:
    chain: [{{critical_path_task_ids}}]
    estimated_duration_min: {{critical_path_duration}}
    bottleneck: "{{bottleneck_description}}"

  # ═══════════════════════════════════════════════════════════════════════════
  # WAVES
  # Each wave executes ALL tasks in TRUE PARALLEL
  # Wave N+1 starts ONLY after Wave N is COMPLETE
  # ═══════════════════════════════════════════════════════════════════════════

  waves:
    {{#each waves}}
    - wave_num: {{this.wave_num}}
      status: "pending"
      task_count: {{this.task_count}}

      # Deming PDSA — predict BEFORE executing
      prediction:
        expected_outputs: {{this.expected_output_count}}
        expected_failures: {{this.expected_failure_count}}
        expected_cost_usd: {{this.expected_cost}}
        expected_duration_sec: {{this.expected_duration}}
        rationale: "{{this.prediction_rationale}}"

      # Tasks in this wave (ALL execute in parallel)
      tasks:
        {{#each this.tasks}}
        - task_id: "{{this.task_id}}"
          description: "{{this.description}}"
          agent: "{{this.agent}}"
          model: "{{this.model}}"
          executor_type: "{{this.executor_type}}"
          timeout: {{this.timeout}}
          output_path: "{{this.output_path}}"
        {{/each}}

      # Wave-level constraints
      constraints:
        max_parallel: {{this.max_parallel}}
        wave_timeout: 900  # 15 min max per wave (timeout-rules.yaml)
        requires_waves: [{{this.requires_waves}}]  # Prior waves that must be complete

      # Prompt caching opportunity
      prompt_caching:
        same_domain_tasks: {{this.same_domain_count}}
        cache_savings_pct: {{this.cache_savings_pct}}
    {{/each}}

  # ═══════════════════════════════════════════════════════════════════════════
  # COST ESTIMATE
  # ═══════════════════════════════════════════════════════════════════════════

  cost_estimate:
    by_model:
      worker: {count: {{worker_count}}, cost_usd: 0.00}
      haiku: {count: {{haiku_count}}, cost_usd: {{haiku_cost}}}
      sonnet: {count: {{sonnet_count}}, cost_usd: {{sonnet_cost}}}
    subtotal_usd: {{subtotal_cost}}
    cache_savings_usd: {{cache_savings}}
    total_estimated_usd: {{total_estimated_cost}}
    vs_opus_main_context: "{{opus_comparison}}"

  # ═══════════════════════════════════════════════════════════════════════════
  # REINERTSEN METRICS
  # ═══════════════════════════════════════════════════════════════════════════

  reinertsen:
    batch_size: "{{total_tasks}} tasks in {{total_waves}} waves (avg {{avg_batch_size}}/wave)"
    wip_limit: {{max_parallel}}
    queue_depth: "Wave {{total_waves}} tasks waiting for {{total_waves - 1}} prior waves"
    flow_efficiency: "{{flow_efficiency_pct}}% (parallel time / total time)"

# ═══════════════════════════════════════════════════════════════════════════════
# VALIDATION RULES
# ═══════════════════════════════════════════════════════════════════════════════

validation:
  - rule: "No circular dependencies (V1.4 — verified by wave-optimizer.py --check-cycles)"
  - rule: "Each wave has <= max_parallel tasks"
  - rule: "All tasks from execution-plan present in waves"
  - rule: "Critical path identified and documented"
  - rule: "Every wave has prediction (Deming PDSA)"
