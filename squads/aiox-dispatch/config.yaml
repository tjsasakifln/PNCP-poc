  - pre-execution-gate.md
  - post-execution-gate.md
  - haiku-prompt-checklist.md
  - dispatch-health-score.md
  - batch-discovery-gate.md
  - batch-prioritization-gate.md
  - batch-dispatch-gate.md

workflows:
  - name: wf-dispatch-main.yaml
