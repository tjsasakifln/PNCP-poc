    file: agents/dispatch-chief.md
    tier: orchestrator
    mind: "Gene Kim"
    role: "Pipeline orchestration"
  - name: quality-gate
    file: agents/quality-gate.md
    tier: 0
    mind: "Deming + Pedro Valério"
    role: "Pre/post-execution validation"
  - name: wave-planner
    file: agents/wave-planner.md
    tier: 1
    minds: "Reinertsen + Goldratt"
    role: "DAG optimization"
  - name: task-router
    file: agents/task-router.md
    tier: 2
    role: "Agent/model/enrichment selection"

tasks:
  planning:
    - plan-execution.md
    - decompose-to-waves.md
    - route-tasks.md
    - convert-input.md
  execution:
