# ==============================================================================
# APEX SQUAD — Design Presets Catalog
# data/design-presets.yaml
# ==============================================================================
# Purpose:  Comprehensive catalog of design styles. Each preset defines a
#           complete design language — colors, typography, spacing, motion,
#           effects, and component patterns. Used by *apex-transform and
#           *apex-inspire to apply styles with a single command.
#
# Usage:    *apex-transform --style {preset_id}
#           *apex-inspire --category {category}
#
# Owner:    apex-lead + design-sys-eng
# Version:  1.0.0
# ==============================================================================

version: "1.1.0"
total_presets: 52  # 31 base + 15 premium (design-presets-premium.yaml) + 6 big tech (design-presets-bigtech.yaml)

# ==============================================================================
# CATALOG STRUCTURE
# ==============================================================================
# Each preset contains:
#   - id: unique identifier (used in --style flag)
#   - name: human-readable name
#   - category: grouping for *apex-inspire
#   - description: what makes this style unique
#   - reference: real-world examples of this style
#   - contrast_validated: true/false — WCAG AA contrast ratios verified for all
#     text-on-background combinations in both light and dark modes
#   - composable: list of preset IDs this can be mixed with (MELHORIA-05)
#   - tokens: complete design token specification
#     - colors: full palette (light + dark)
#     - typography: font stack, scale, weights
#     - spacing: base unit + scale
#     - radius: border-radius scale
#     - shadows: elevation system
#     - motion: spring configs + animation patterns
#     - effects: blur, gradients, glows, textures
#   - component_patterns: how common components should look
#   - css_variables_prefix: CSS custom property prefix
#   - tailwind_extend: Tailwind config extensions (if applicable)

# ==============================================================================
# CONTRAST VALIDATION PROTOCOL (GAP-06)
# ==============================================================================
# Every preset MUST have contrast_validated: true before being usable in
# *apex-transform. The validation checks:
#   1. text-primary on background: >= 7:1 (AAA)
#   2. text-primary on surface: >= 4.5:1 (AA)
#   3. text-secondary on background: >= 4.5:1 (AA)
#   4. text-secondary on surface: >= 3:1 (AA large text)
#   5. text-tertiary on background: >= 3:1 (AA large text)
#   6. primary on background (interactive): >= 3:1 (AA)
#   7. All checks run for BOTH light and dark modes
#
# If contrast_validated is false or missing:
#   - *apex-transform shows WARNING before applying
#   - @a11y-eng is auto-chained after transform to verify
#   - Gate QG-AX-005 will catch violations in final review
#
# Validation tool: oklch-contrast-check (computed, no external dependency)
# ==============================================================================

# ==============================================================================
# PRESET COMPOSITION (MELHORIA-05)
# ==============================================================================
# Presets can be composed using: *apex-transform --style A+B
# Composition rules:
#   - First preset (A) provides: colors, typography, spacing, radius
#   - Second preset (B) provides: motion, effects, component_patterns
#   - Conflicts: B overrides A for overlapping tokens
#   - Only presets listed in each other's `composable` field can be mixed
#   - Incompatible pairs (e.g., neumorphism + flat) are blocked
# ==============================================================================

# ==============================================================================
