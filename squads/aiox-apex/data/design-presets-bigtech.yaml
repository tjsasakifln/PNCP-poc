      navigation patterns. Tokens capture the stable foundation; component_patterns
      may need refresh if adopting this preset after 2026-Q1.
    description: >
      OpenAI/ChatGPT aesthetic. Academic elegance meets frontier technology —
      a minimal interface designed for conversation-centric interaction with
      subtle green accents that echo intelligence and growth. Clean typography
      with generous line-height optimized for reading long-form AI-generated
      content, monospace code blocks with syntax highlighting, and a sidebar
      navigation pattern that keeps conversation history accessible. The design
      whispers sophistication while staying invisible to the content.
    reference: ["openai.com", "chatgpt.com"]
