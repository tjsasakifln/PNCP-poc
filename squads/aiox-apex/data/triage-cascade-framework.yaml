      full: { agents: 5, when: "Complex multi-workflow pipeline" }
      minimal: { agents: 3, when: "Single workflow conversion" }

  squad_creator:
    scope_mapping:
      micro: "1 agent tweak, 1 task fix"
      small: "Agent enhancement, new task"
      medium: "Full agent creation with tasks + workflows"
      large: "Full squad creation from scratch"
    domains:
      - { domain: "knowledge-extraction", agent: "oalanicolas", keywords: [extract, mind clone, DNA, heuristics] }
