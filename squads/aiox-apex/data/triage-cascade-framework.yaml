# ═══════════════════════════════════════════════════════════════════════════════
# CROSS-SQUAD APPLICABILITY
# How other squads can instantiate their own Triage Cascade
# ═══════════════════════════════════════════════════════════════════════════════

cross_squad:
  n8n_forge:
