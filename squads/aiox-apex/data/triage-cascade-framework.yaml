      - { domain: "code-conversion", agent: "code-converter", keywords: [convert, standalone, n8n to code, export] }
      - { domain: "integration-arch", agent: "integration-arch", keywords: [API, integration, credential, auth] }
      - { domain: "qa-automation", agent: "qa-automation", keywords: [test, validate, mock, regression] }
