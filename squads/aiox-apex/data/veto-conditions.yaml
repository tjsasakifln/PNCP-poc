# ==============================================================================
# APEX SQUAD — Veto Conditions Registry
# data/veto-conditions.yaml
# ==============================================================================
# Purpose:  Central registry of ALL automated veto conditions that physically
#           block wrong paths in Squad Apex workflows. Every quality gate has
#           at least one veto condition with an automated enforcement mechanism.
#
# Philosophy: "Se o executor CONSEGUE fazer errado, o processo está errado."
#             Veto conditions are not suggestions — they are physical blocks.
#
# Owner:    apex-lead
# Version:  1.3.0
# ==============================================================================

version: "2.0.0"
enforcement_mode: strict  # strict = all veto conditions are blocking
fallback_on_tool_failure: BLOCK  # If verification tool fails, block (safe default)

# Meta-framework: data/veto-physics-framework.yaml
# This file defines WHICH conditions exist. The meta-framework defines HOW to create them.

# ==============================================================================
# QUALITY GATE VETO CONDITIONS
# ==============================================================================
gates:

  QG-AX-001:
    name: Design Token Spec Validated
    profiles: [full, web-next]  # Only enforced when token system exists
    veto_conditions:
      - id: VC-001-A
        condition: "Hardcoded hex values found in component source"
        available_check: "test -d packages/ui/src/components"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn '#[0-9a-fA-F]\\{3,8\\}' packages/ui/src/components/ --include='*.tsx' --include='*.ts' --include='*.css.ts' | grep -v '.stories.' | grep -v '.test.' | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — Remove all hardcoded hex values. Use design tokens from packages/tokens/."
        auto_fixable: false

      - id: VC-001-B
        condition: "Hardcoded pixel values in spacing (not derived from token scale)"
        available_check: "test -d packages/ui/src/components"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'padding:\\s*[0-9]\\+px\\|margin:\\s*[0-9]\\+px\\|gap:\\s*[0-9]\\+px' packages/ui/src/components/ --include='*.css.ts' | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — Use spacing tokens (var(--spacing-*)) instead of hardcoded pixels."
        auto_fixable: false

      - id: VC-001-C
        condition: "Token naming does not follow convention"
        available_check: "npm run tokens:validate --dry-run 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING
        check: "npm run tokens:validate -- --naming-only --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Fix token naming to follow {category}/{variant}/{state} convention."
        auto_fixable: false

  QG-AX-002:
    name: Figma Spec Completeness
    profiles: [full, web-next]  # Full pipeline only
    veto_conditions:
      - id: VC-002-A
        condition: "Design spec document missing or empty"
        available_check: "test -d docs/design"
        on_unavailable: SKIP_WITH_WARNING
        check: "test -s docs/design/{story_id}-spec.md"
        threshold: true
        operator: file_exists_and_not_empty
        action: "VETO — Design spec must exist and contain content before proceeding."
        auto_fixable: false

      - id: VC-002-B
        condition: "Token delta list not produced"
        available_check: "test -d docs/design"
        on_unavailable: SKIP_WITH_WARNING
        check: "test -s docs/design/{story_id}-token-delta.md"
        threshold: true
        operator: file_exists_and_not_empty
        action: "VETO — Token delta analysis required before token extraction."
        auto_fixable: false

      - id: VC-002-C
        name: 4px Grid Compliance
        description: "All spacing and sizing values must be multiples of 4px"
        available_check: "test -d packages/ui/src/components"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep for non-4px-multiple values in component CSS files — no 3px, 5px, 7px, 11px etc."
        threshold: "Zero hardcoded non-grid values (e.g., no 3px, 5px, 7px, 11px, 13px, 15px)"
        enforcement_level: 2  # Pre-commit Hook
        tool: "grep -rn 'margin:\\|padding:\\|gap:\\|width:\\|height:' --include='*.css.ts' --include='*.module.css' | grep -vE '(0|4|8|12|16|20|24|28|32|36|40|44|48|52|56|60|64|72|80|96|128)px'"

  QG-AX-003:
    name: Design Spec Approved
    profiles: [full, web-next]
    veto_conditions:
      - id: VC-003-A
        condition: "Design spec not approved by apex-lead"
        available_check: "test -d docs/design"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -c 'APPROVED' docs/design/{story_id}-spec.md"
        threshold: 1
        operator: greater_or_equal
        action: "VETO — apex-lead must add APPROVED marker to design spec."
        auto_fixable: false

      - id: VC-003-B
        condition: "Required design artifacts missing"
        available_check: "test -d docs/design"
        on_unavailable: SKIP_WITH_WARNING
        check: |
          test -f docs/design/{story_id}-spec.md &&
          test -f docs/design/{story_id}-token-delta.md
        threshold: true
        operator: all_pass
        action: "VETO — All design artifacts must exist at checkpoint."
        auto_fixable: false

  QG-AX-004:
    name: Architecture Review Passed
    profiles: [full, web-next]
    veto_conditions:
      - id: VC-004-A
        condition: "Architecture documents missing"
        available_check: "test -d docs/architecture"
        on_unavailable: SKIP_WITH_WARNING
        check: |
          test -f docs/architecture/{story_id}-components.yaml &&
          test -f docs/architecture/{story_id}-state.md &&
          test -f docs/architecture/{story_id}-platforms.md
        threshold: true
        operator: all_pass
        action: "VETO — All 3 architecture documents required before implementation."
        auto_fixable: false

      - id: VC-004-B
        condition: "Components YAML not valid"
        available_check: "test -d docs/architecture"
        on_unavailable: SKIP_WITH_WARNING
        check: "node -e \"require('js-yaml').load(require('fs').readFileSync('docs/architecture/{story_id}-components.yaml','utf8'))\""
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Components hierarchy YAML must be valid."
        auto_fixable: false

  QG-AX-005:
    name: Component Accessibility Passed
    profiles: [full, web-next, web-spa, minimal]  # Always enforced
    veto_conditions:
      - id: VC-005-A
        condition: "axe-core violations found"
        available_check: "npm run test:a11y --dry-run 2>/dev/null"
        on_unavailable: MANUAL_CHECK  # Agent performs manual a11y review instead
        check: "npm run test:a11y -- --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Zero axe-core violations required. Fix all violations before proceeding."
        auto_fixable: false

      - id: VC-005-B
        condition: "Missing prefers-reduced-motion handling"
        available_check: "test -d packages/ui/src/components || test -d src/components"
        on_unavailable: MANUAL_CHECK
        check: "grep -rL 'prefers-reduced-motion\\|useReducedMotion\\|shouldReduceMotion' src/components/ --include='*.tsx' --include='*.css' 2>/dev/null | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — Components with animation must handle prefers-reduced-motion."
        auto_fixable: false

      - id: VC-005-C
        condition: "Interactive element without accessible name"
        available_check: "npm run test:a11y --dry-run 2>/dev/null"
        on_unavailable: MANUAL_CHECK
        check: "npm run test:a11y -- --rule=label --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — All interactive elements must have accessible names (aria-label, visible text, etc.)."
        auto_fixable: false

      - id: VC-005-D
        name: WCAG 2.2 AA Compliance
        description: "Full WCAG 2.2 AA audit must pass — axe-core alone is insufficient for complete AA coverage"
        available_check: "npm run test:a11y --dry-run 2>/dev/null"
        on_unavailable: MANUAL_CHECK
        check: "axe-core automated scan (VC-005-A) PLUS manual keyboard navigation test PLUS screen reader test (VoiceOver or NVDA)"
        threshold: "Zero critical/serious axe violations AND keyboard test pass AND screen reader test pass"
        enforcement_level: 2  # Pre-commit Hook (automated) + 3 Workflow Blocker (manual)
        tool: "axe-core + manual audit checklist (checklists/wcag-22-checklist.md)"

  QG-AX-006:
    name: Motion & Animation Review
    profiles: [full, web-next, web-spa]  # Enforced when motion library present
    veto_conditions:
      - id: VC-006-A
        condition: "CSS transition/animation used instead of spring physics"
        available_check: "test -d src/components || test -d packages/ui/src/components"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'transition:\\|animation:' src/components/ --include='*.tsx' --include='*.css' | grep -v 'color\\|background\\|opacity\\|visibility\\|border-color\\|outline' | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — Use spring physics (Framer Motion / Reanimated) for all motion. CSS transitions allowed only for color/opacity."
        auto_fixable: false

      - id: VC-006-B
        condition: "Hardcoded animation durations (not from motion tokens)"
        available_check: "test -d src/components || test -d packages/ui/src/components"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'duration:\\s*[0-9]' src/components/ --include='*.tsx' | grep -v 'import\\|from\\|//' | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — All animation durations must reference motion tokens."
        auto_fixable: false

  QG-AX-007:
    name: Performance Budget Met
    profiles: [full, web-next, web-spa]
    veto_conditions:
      - id: VC-007-A
        condition: "Lighthouse performance score below threshold"
        available_check: "npx lhci --version 2>/dev/null"
        on_unavailable: MANUAL_CHECK  # Agent reviews build output size manually
        check: "npm run lighthouse:ci -- --performance=90 --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Lighthouse Performance score must be >= 90."
        auto_fixable: false

      - id: VC-007-B
        condition: "Bundle size exceeds budget"
        available_check: "npm run analyze:bundle --dry-run 2>/dev/null"
        on_unavailable: MANUAL_CHECK  # Agent checks build output size from vite build
        check: "npm run analyze:bundle -- --max-delta=50 --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Bundle size delta exceeds 50KB limit."
        auto_fixable: false

      - id: VC-007-C
        condition: "LCP exceeds 1.2s on any measured page"
        available_check: "npx lhci --version 2>/dev/null"
        on_unavailable: MANUAL_CHECK
        check: "npm run lighthouse:ci -- --lcp=1200 --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — LCP must be < 1.2s. Reference: data/performance-budgets.yaml"
        auto_fixable: false

      - id: VC-007-D
        name: INP Budget
        description: "Interaction to Next Paint must be under 200ms"
        available_check: "npx lhci --version 2>/dev/null"
        on_unavailable: MANUAL_CHECK
        check: "Lighthouse CI INP measurement on representative user flows"
        threshold: "inp < 200ms"
        enforcement_level: 1  # CI Pipeline
        tool: "lighthouse-ci --collect --assert"

      - id: VC-007-E
        name: CLS Budget
        description: "Cumulative Layout Shift must be under 0.1"
        available_check: "npx lhci --version 2>/dev/null"
        on_unavailable: MANUAL_CHECK
        check: "Lighthouse CI CLS measurement on all feature pages"
        threshold: "cls < 0.1"
        enforcement_level: 1  # CI Pipeline
        tool: "lighthouse-ci --collect --assert"

  QG-AX-008:
    name: Visual Regression Passed
    profiles: [full, web-next]  # Only when Chromatic/Storybook configured
    veto_conditions:
      - id: VC-008-A
        condition: "Chromatic visual regressions detected"
        available_check: "npx chromatic --version 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING
        check: "npm run chromatic -- --exit-zero-on-changes=false --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Zero unresolved visual regressions allowed."
        auto_fixable: false

      - id: VC-008-B
        condition: "Storybook build fails"
        available_check: "npx storybook --version 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING
        check: "npm run storybook:build -- --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Storybook must build without errors."
        auto_fixable: false

  QG-AX-009:
    name: Cross-Platform Compatibility
    profiles: [full]  # Only for cross-platform projects
    veto_conditions:
      - id: VC-009-A
        condition: "Playwright cross-browser tests fail"
        available_check: "npx playwright --version 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING
        check: "npm run test:e2e -- --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — All Playwright cross-browser tests must pass."
        auto_fixable: false

      - id: VC-009-B
        condition: "CRITICAL severity bug found in cross-platform testing"
        available_check: "test -d docs/qa/ship"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -c 'severity: CRITICAL' docs/qa/ship/{story_id}-xplatform-report.md 2>/dev/null"
        threshold: 0
        operator: equals
        action: "VETO — Zero CRITICAL bugs allowed. Fix before ship."
        auto_fixable: false

      - id: VC-009-C
        condition: "Mobile app cold start exceeds 1 second"
        available_check: "npx detox --version 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING  # Mobile not in project
        check: "Measure cold start time on reference device (iPhone 14 / Pixel 7)"
        threshold: "startup_time < 1000ms"
        operator: less_than
        enforcement_level: 3  # Workflow Blocker
        action: "VETO — Mobile app cold start must be under 1 second."
        tool: "Detox performance measurement or manual measurement with stopwatch"
        auto_fixable: false

      - id: VC-009-D
        condition: "UI animations or scrolling drop below 60fps"
        available_check: "npx detox --version 2>/dev/null || npx react-native --version 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING  # Mobile not in project
        check: "Profile with Xcode Instruments (iOS) or Android Studio Profiler"
        threshold: "fps >= 60 for all user interactions"
        operator: greater_or_equal
        enforcement_level: 3  # Workflow Blocker
        action: "VETO — UI animations and scrolling must maintain 60fps."
        tool: "Platform profiler"
        auto_fixable: false

      - id: VC-009-E
        condition: "Application Not Responding event detected"
        available_check: "npx detox --version 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING  # Mobile not in project
        check: "Monitor ANR events during E2E test suite execution"
        threshold: "anr_count == 0"
        operator: equals
        enforcement_level: 3  # Workflow Blocker
        action: "VETO — ANR rate must be zero. No ANR events allowed."
        tool: "Detox E2E or platform-specific ANR monitoring"
        auto_fixable: false

  QG-AX-010:
    name: Lead Sign-off
    veto_conditions:
      - id: VC-010-A
        condition: "apex-lead has not signed off"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        check: "manual"
        threshold: "apex-lead approval recorded"
        operator: manual_verification
        action: "VETO — Non-waivable. apex-lead sign-off is always required."
        auto_fixable: false
        waivable: false

      - id: VC-010-B
        condition: "TypeScript errors present"
        available_check: "npm run typecheck --dry-run 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING  # No TypeScript in project
        check: "npm run typecheck -- --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Zero TypeScript errors before merge."
        auto_fixable: false

      - id: VC-010-C
        condition: "Lint errors present"
        available_check: "npm run lint --dry-run 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING  # No linter configured
        check: "npm run lint -- --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Zero lint errors before merge."
        auto_fixable: false

# ==============================================================================
# CROSS-PLATFORM SYNC GATES (QG-AX-XP)
# ==============================================================================

  QG-AX-XP-001:
    name: Shared Package Validation Passed
    profiles: [full]  # Only for monorepo cross-platform projects
    veto_conditions:
      - id: VC-XP-001-A
        name: Shared Package Builds
        description: "All shared packages in packages/ must build without errors"
        available_check: "test -d packages && npm run build --workspace=packages/* --dry-run 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING  # No monorepo packages/ directory
        check: "npm run build --workspace=packages/*"
        threshold: "Exit code 0, zero TypeScript errors"
        enforcement_level: 1  # CI Pipeline
        tool: "npm run build"
      - id: VC-XP-001-B
        name: Shared Package Tests Pass
        description: "All shared package unit tests must pass"
        available_check: "test -d packages && npm run test --workspace=packages/* --dry-run 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING  # No monorepo packages/ directory
        check: "npm run test --workspace=packages/*"
        threshold: "Zero test failures"
        enforcement_level: 1  # CI Pipeline
        tool: "npm run test"
      - id: VC-XP-001-C
        name: No Breaking API Changes
        description: "Shared package public API must not have breaking changes without major version bump"
        available_check: "npx api-extractor --version 2>/dev/null"
        on_unavailable: MANUAL_CHECK  # Agent reviews exports diff manually
        check: "Compare exported types/functions against previous release"
        threshold: "Zero unintentional breaking changes"
        enforcement_level: 3  # Workflow Blocker
        tool: "api-extractor or manual diff review"

  QG-AX-XP-002:
    name: Token Parity Verified
    profiles: [full]  # Only for cross-platform with multi-platform tokens
    veto_conditions:
      - id: VC-XP-002-A
        name: Token File Exists Per Platform
        description: "Token output files must exist for all target platforms"
        available_check: "test -d tokens/build"
        on_unavailable: SKIP_WITH_WARNING  # No multi-platform token build
        check: "Verify token build output exists for web, iOS, Android"
        threshold: "All platform token files present and non-empty"
        enforcement_level: 2  # Pre-commit Hook
        tool: "test -s tokens/build/web.css && test -s tokens/build/ios.json && test -s tokens/build/android.xml"
      - id: VC-XP-002-B
        name: Token Values Match Across Platforms
        description: "Semantic token values must be identical across all platform outputs"
        available_check: "test -d tokens/build && ls tokens/build/*.json 2>/dev/null | wc -l | grep -q '[2-9]'"
        on_unavailable: SKIP_WITH_WARNING  # Less than 2 platform outputs
        check: "Cross-compare token values between platform outputs"
        threshold: "Zero value mismatches for semantic tokens"
        enforcement_level: 3  # Workflow Blocker
        tool: "Custom token parity script or manual comparison"
      - id: VC-XP-002-C
        name: No Platform-Only Tokens
        description: "No semantic tokens should exist in only one platform output"
        available_check: "test -d tokens/build && ls tokens/build/*.json 2>/dev/null | wc -l | grep -q '[2-9]'"
        on_unavailable: SKIP_WITH_WARNING  # Less than 2 platform outputs
        check: "Diff token key lists across platforms"
        threshold: "All semantic token keys present in all platforms"
        enforcement_level: 3  # Workflow Blocker
        tool: "diff <(jq keys web.json) <(jq keys ios.json)"

  QG-AX-XP-003:
    name: Cross-Platform QA Passed
    profiles: [full]  # Only for cross-platform projects
    veto_conditions:
      - id: VC-XP-003-A
        name: Web Browser Matrix Pass
        description: "Feature must render correctly in Chrome, Firefox, Safari, Edge (latest 2 versions)"
        available_check: "npx playwright --version 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING  # Playwright not installed
        check: "Playwright cross-browser test suite"
        threshold: "Zero failures across all browser targets"
        enforcement_level: 1  # CI Pipeline
        tool: "npx playwright test --project=chromium,firefox,webkit"
      - id: VC-XP-003-B
        name: Mobile Platform Pass
        description: "Feature must function correctly on iOS 16+ and Android 12+"
        available_check: "npx detox --version 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING  # Mobile/Detox not in project
        check: "Detox E2E test suite on reference devices"
        threshold: "Zero critical failures on reference devices"
        enforcement_level: 3  # Workflow Blocker
        tool: "npx detox test --configuration ios.sim.release && npx detox test --configuration android.emu.release"
      - id: VC-XP-003-C
        name: Feature Parity Verified
        description: "Core user flows must produce equivalent results across all platforms"
        available_check: "test -d docs/qa/ship"
        on_unavailable: MANUAL_CHECK  # Agent performs manual parity review
        check: "Cross-platform scenario comparison (same inputs → same outputs)"
        threshold: "All core flows produce equivalent results"
        enforcement_level: 3  # Workflow Blocker
        tool: "Manual cross-platform walkthrough with documented checklist"

  QG-AX-XP-004:
    name: Final Visual Review Approved
    profiles: [full]  # Only for cross-platform projects
    veto_conditions:
      - id: VC-XP-004-A
        name: Visual Regression Clean
        description: "Zero unreviewed visual diffs across all platforms"
        available_check: "npx chromatic --version 2>/dev/null || npx percy --version 2>/dev/null"
        on_unavailable: MANUAL_CHECK  # Agent performs manual visual comparison
        check: "Chromatic or Percy visual regression across platforms"
        threshold: "Zero unreviewed visual changes"
        enforcement_level: 1  # CI Pipeline
        tool: "npx chromatic --exit-zero-on-changes=false"
      - id: VC-XP-004-B
        name: Design Fidelity Approved
        description: "apex-lead confirms implementation matches Figma across all platforms"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK  # Always manual — apex-lead review
        check: "Manual overlay comparison against Figma spec"
        threshold: "Within 1px tolerance on all platforms"
        enforcement_level: 4  # Manual Sign-off
        tool: "Manual review by apex-lead"
      - id: VC-XP-004-C
        name: Interaction Consistency
        description: "Interactions (hover, press, focus, swipe) feel consistent across platforms"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK  # Always manual — apex-lead review
        check: "Manual interaction testing on each platform"
        threshold: "Interactions feel native and consistent"
        enforcement_level: 4  # Manual Sign-off
        tool: "Manual review by apex-lead"

# ==============================================================================
# POLISH CYCLE GATES (QG-AX-PL)
# ==============================================================================

  QG-AX-PL-001:
    name: Audits Complete
    profiles: [full, web-next, web-spa]  # Polish cycle for all non-minimal profiles
    veto_conditions:
      - id: VC-PL-001-A
        name: Motion Audit Report Generated
        description: "Motion audit report must exist (or skip justification recorded)"
        available_check: "test -d docs/qa/polish"
        on_unavailable: SKIP_WITH_WARNING  # Polish directory not created yet
        check: "test -s docs/qa/polish/{story_id}-motion-audit.md || inputs.skip_motion_audit == true"
        threshold: "File exists and is non-empty, OR skip flag is true"
        enforcement_level: 3  # Workflow Blocker
        tool: "File existence check"
      - id: VC-PL-001-B
        name: Accessibility Audit Report Generated
        description: "Accessibility audit report must exist — never skippable"
        available_check: "test -d docs/qa/polish"
        on_unavailable: SKIP_WITH_WARNING  # Polish directory not created yet
        check: "test -s docs/qa/polish/{story_id}-a11y-audit.md"
        threshold: "File exists and is non-empty"
        enforcement_level: 3  # Workflow Blocker
        tool: "File existence check"
      - id: VC-PL-001-C
        name: Performance Audit Report Generated
        description: "Performance audit report must exist — never skippable"
        available_check: "test -d docs/qa/polish"
        on_unavailable: SKIP_WITH_WARNING  # Polish directory not created yet
        check: "test -s docs/qa/polish/{story_id}-perf-audit.md"
        threshold: "File exists and is non-empty"
        enforcement_level: 3  # Workflow Blocker
        tool: "File existence check"

  QG-AX-PL-002:
    name: Accessibility WCAG 2.2 AA Compliant
    profiles: [full, web-next, web-spa, minimal]  # Always enforced
    veto_conditions:
      - id: VC-PL-002-A
        name: axe-core Zero Violations
        description: "axe-core automated scan must return zero violations"
        available_check: "npm run test:a11y --dry-run 2>/dev/null"
        on_unavailable: MANUAL_CHECK  # Agent performs manual a11y review
        check: "npm run test:a11y -- --story-id={story_id}"
        threshold: "Zero violations (critical, serious, moderate)"
        enforcement_level: 1  # CI Pipeline
        tool: "axe-core"
      - id: VC-PL-002-B
        name: Keyboard Navigation Functional
        description: "All interactive elements reachable and operable via keyboard"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK  # Always manual
        check: "Manual keyboard navigation test documented in a11y audit report"
        threshold: "Zero keyboard navigation failures"
        enforcement_level: 3  # Workflow Blocker
        tool: "Manual test (keyboard only navigation)"
      - id: VC-PL-002-C
        name: Screen Reader Announces Correctly
        description: "All content and state changes announced correctly by screen readers"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK  # Always manual
        check: "Manual screen reader test (VoiceOver or NVDA) documented in a11y audit report"
        threshold: "Zero critical screen reader issues"
        enforcement_level: 3  # Workflow Blocker
        tool: "Manual test (VoiceOver, NVDA, or TalkBack)"

  QG-AX-PL-003:
    name: Performance Budget Met
    profiles: [full, web-next, web-spa]  # Performance gates for all web profiles
    veto_conditions:
      - id: VC-PL-003-A
        name: LCP Within Budget
        description: "Largest Contentful Paint must be under 1.2s (Apex ultra-premium)"
        available_check: "npx lhci --version 2>/dev/null"
        on_unavailable: MANUAL_CHECK  # Agent checks via browser DevTools
        check: "Lighthouse CI LCP measurement"
        threshold: "lcp < 1200ms"
        enforcement_level: 1  # CI Pipeline
        tool: "lighthouse-ci"
      - id: VC-PL-003-B
        name: INP Within Budget
        description: "Interaction to Next Paint must be under 200ms"
        available_check: "npx lhci --version 2>/dev/null"
        on_unavailable: MANUAL_CHECK  # Agent checks via browser DevTools
        check: "Lighthouse CI INP measurement"
        threshold: "inp < 200ms"
        enforcement_level: 1  # CI Pipeline
        tool: "lighthouse-ci"
      - id: VC-PL-003-C
        name: CLS Within Budget
        description: "Cumulative Layout Shift must be under 0.1"
        available_check: "npx lhci --version 2>/dev/null"
        on_unavailable: MANUAL_CHECK  # Agent checks via browser DevTools
        check: "Lighthouse CI CLS measurement"
        threshold: "cls < 0.1"
        enforcement_level: 1  # CI Pipeline
        tool: "lighthouse-ci"
      - id: VC-PL-003-D
        name: Bundle Size Within Budget
        description: "JS bundle size must be within budget per data/performance-budgets.yaml"
        available_check: "npm run build --dry-run 2>/dev/null"
        on_unavailable: MANUAL_CHECK  # Agent checks build output size manually
        check: "Bundle analyzer comparison against budget file"
        threshold: "Total gzipped JS < 80KB (or per-feature budget)"
        enforcement_level: 1  # CI Pipeline
        tool: "npm run build -- --analyze"

  QG-AX-PL-004:
    name: Polish Gate Approved
    profiles: [full, web-next, web-spa]  # Polish gate for all non-minimal profiles
    veto_conditions:
      - id: VC-PL-004-A
        name: apex-lead Sign-off Recorded
        description: "apex-lead must record explicit approval in polish gate verdict"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK  # Always manual — apex-lead review
        check: "Polish gate verdict is APPROVED (not NEEDS_POLISH or REJECTED)"
        threshold: "verdict == APPROVED"
        enforcement_level: 4  # Manual Sign-off
        tool: "apex-lead manual review"
      - id: VC-PL-004-B
        name: All Critical/High Issues Resolved
        description: "Zero critical or high severity issues remaining in any audit domain"
        available_check: "test -d docs/qa/polish"
        on_unavailable: SKIP_WITH_WARNING  # No polish reports yet
        check: "Cross-check all three audit reports for unresolved critical/high items"
        threshold: "Zero unresolved critical/high severity items"
        enforcement_level: 3  # Workflow Blocker
        tool: "Audit report review"
      - id: VC-PL-004-C
        name: Hands-On Review Passed
        description: "apex-lead completed hands-on review (keyboard, screen reader, reduced motion, dark mode, mobile)"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK  # Always manual — apex-lead review
        check: "All hands-on review items checked in step-4-2"
        threshold: "All items passed"
        enforcement_level: 4  # Manual Sign-off
        tool: "Manual review by apex-lead"

# ==============================================================================
# LIGHTWEIGHT PIPELINE GATES (apex-fix, apex-quick)
# ==============================================================================

  QG-AX-FIX-001:
    name: Fix Scope Guard
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:
      - id: VC-FIX-001-A
        condition: "Fix scope exceeds 5 files"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        check: "Count files modified by fix operation"
        threshold: 5
        operator: less_or_equal
        action: "VETO — Scope too large for *apex-fix. Use *apex-quick instead."
        auto_fixable: false
      - id: VC-FIX-001-B
        condition: "Fix creates new user-facing component"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        check: "Detect new component file creation in fix flow"
        threshold: 0
        operator: equals
        action: "VETO — New components require *apex-quick (specify phase needed)."
        auto_fixable: false
      - id: VC-FIX-001-C
        condition: "Fix modifies shared packages"
        available_check: "test -d packages/"
        on_unavailable: SKIP_WITH_WARNING
        check: "Detect modifications to packages/ directory"
        threshold: 0
        operator: equals
        action: "VETO — Shared package changes require full pipeline (*apex-go)."
        auto_fixable: false

  QG-QK-001:
    name: Quick Pipeline TypeScript Gate
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:
      - id: VC-QK-001-A
        condition: "TypeScript errors after quick pipeline implementation"
        available_check: "npm run typecheck --dry-run 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING
        check: "npm run typecheck -- --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Zero TypeScript errors required before shipping quick pipeline."
        auto_fixable: false

  QG-QK-002:
    name: Quick Pipeline Lint Gate
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:
      - id: VC-QK-002-A
        condition: "Lint errors after quick pipeline implementation"
        available_check: "npm run lint --dry-run 2>/dev/null"
        on_unavailable: SKIP_WITH_WARNING
        check: "npm run lint -- --exit-code"
        threshold: 0
        operator: exit_code_equals
        action: "VETO — Zero lint errors required before shipping quick pipeline."
        auto_fixable: false

  QG-QK-003:
    name: Quick Pipeline Scope Guard
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:
      - id: VC-QK-003-A
        condition: "Quick pipeline creates new shared package"
        available_check: "test -d packages/"
        on_unavailable: SKIP_WITH_WARNING
        check: "Detect new directory creation under packages/"
        threshold: 0
        operator: equals
        action: "VETO — New shared packages require full pipeline (*apex-go)."
        auto_fixable: false
      - id: VC-QK-003-B
        condition: "Quick pipeline spans cross-platform (web + mobile)"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        check: "Detect modifications to both web and mobile directories"
        threshold: 0
        operator: equals
        action: "VETO — Cross-platform changes require full pipeline (*apex-go)."
        auto_fixable: false

# ==============================================================================
# DEEP TASK QUALITY GATES (QG-AX-DEEP)
# ==============================================================================

  QG-AX-DEEP-001:
    name: Interaction Quality Gate
    profiles: [full, web-next, web-spa]
    veto_conditions:
      - id: VC-DEEP-001-A
        condition: "Micro-interaction missing feedback on user action (hover, press, focus)"
        available_check: "test -d src/components || test -d packages/ui/src/components"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'onClick\\|onPress\\|onSubmit' src/components/ --include='*.tsx' | grep -v 'whileTap\\|whileHover\\|animate\\|transition\\|:hover\\|:active\\|:focus' | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — All interactive elements must have visual feedback (hover, press, focus states). See micro-interaction-design.md."
        auto_fixable: false

      - id: VC-DEEP-001-B
        condition: "Loading state uses spinner instead of skeleton or optimistic UI"
        available_check: "test -d src/components || test -d packages/ui/src/components"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'spinner\\|Spinner\\|CircularProgress\\|loading-spinner' src/components/ --include='*.tsx' --include='*.css' | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — Use skeleton screens or optimistic UI instead of spinners. See loading-state-patterns.md."
        auto_fixable: false

      - id: VC-DEEP-001-C
        condition: "Empty state renders blank area without guidance"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        check: "Review components that conditionally render lists/data for empty state handling (illustration, message, CTA)"
        threshold: "All data-dependent views handle empty state with guidance"
        operator: manual_verification
        action: "VETO — Empty states must include illustration, explanatory message, and actionable CTA. See empty-state-design.md."
        auto_fixable: false

      - id: VC-DEEP-001-D
        condition: "Onboarding flow lacks progress indicator or skip option"
        available_check: "manual"
        on_unavailable: SKIP_WITH_WARNING
        check: "Review onboarding/tour/coachmark components for progress tracking and skip/dismiss affordance"
        threshold: "All onboarding flows have progress indicator and skip option"
        operator: manual_verification
        action: "VETO — Onboarding must show progress and allow skip/dismiss at any point. See onboarding-flow-design.md."
        auto_fixable: false

  QG-AX-DEEP-002:
    name: i18n Readiness Gate
    profiles: [full, web-next, web-spa]
    veto_conditions:
      - id: VC-DEEP-002-A
        condition: "User-facing strings not using ICU message format"
        available_check: "test -d src/locales || test -d src/i18n || test -f src/messages.ts"
        on_unavailable: SKIP_WITH_WARNING
        check: "Verify all translation files use ICU MessageFormat syntax for plurals, selects, and interpolation"
        threshold: "Zero non-ICU formatted messages in translation files"
        operator: manual_verification
        action: "VETO — All translatable strings must use ICU MessageFormat. See icu-message-format.md."
        auto_fixable: false

      - id: VC-DEEP-002-B
        condition: "Dates, numbers, or currencies formatted without locale-aware API"
        available_check: "test -d src/components || test -d packages/ui/src/components"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'toFixed\\|toLocaleString\\|new Date().toString\\|moment().format' src/ --include='*.tsx' --include='*.ts' | grep -v 'Intl\\.' | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — Use Intl.DateTimeFormat, Intl.NumberFormat, or equivalent locale-aware APIs. See i18n-date-number-formatting.md."
        auto_fixable: false

      - id: VC-DEEP-002-C
        condition: "RTL layout not supported or causes visual breakage"
        available_check: "manual"
        on_unavailable: SKIP_WITH_WARNING
        check: "Verify logical CSS properties (margin-inline-start, padding-inline-end) used instead of physical (margin-left, padding-right). Check dir='rtl' rendering."
        threshold: "Zero physical-direction CSS properties in components targeting i18n"
        operator: manual_verification
        action: "VETO — Use CSS logical properties for RTL support. See rtl-layout-patterns.md."
        auto_fixable: false

  QG-AX-DEEP-003:
    name: Architecture Quality Gate
    profiles: [full]  # Architecture gates only for full monorepo projects
    veto_conditions:
      - id: VC-DEEP-003-A
        condition: "Monorepo package boundaries violated (cross-package direct imports)"
        available_check: "test -d packages/ && test -f turbo.json || test -f lerna.json || test -f pnpm-workspace.yaml"
        on_unavailable: SKIP_WITH_WARNING
        check: "Verify packages import each other only through published entry points (package.json exports), not relative paths crossing package boundaries"
        threshold: "Zero cross-package boundary violations"
        operator: manual_verification
        action: "VETO — Packages must import through entry points, not relative paths. See monorepo-architecture-design.md."
        auto_fixable: false

      - id: VC-DEEP-003-B
        condition: "Module federation remote exposes internal implementation details"
        available_check: "test -f webpack.config.js || test -f module-federation.config.ts"
        on_unavailable: SKIP_WITH_WARNING
        check: "Verify exposed modules in ModuleFederationPlugin only export public API contracts, not internal components or utilities"
        threshold: "Zero internal implementation leaks in federation exposes"
        operator: manual_verification
        action: "VETO — Federation remotes must only expose public API contracts. See module-federation-design.md."
        auto_fixable: false

      - id: VC-DEEP-003-C
        condition: "Barrel file re-exports cause tree-shaking failure"
        available_check: "test -d src/components || test -d packages/"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'export \\* from' src/ --include='index.ts' --include='index.tsx' | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — Replace wildcard re-exports with named exports in barrel files. See barrel-file-optimization.md."
        auto_fixable: false

      - id: VC-DEEP-003-D
        condition: "Service dependencies hardcoded instead of injected"
        available_check: "test -d src/services || test -d src/providers"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'new .*Service()\\|new .*Client()\\|new .*Repository()' src/ --include='*.tsx' --include='*.ts' | grep -v 'test\\|spec\\|mock' | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — Use dependency injection for services. See dependency-injection-patterns.md."
        auto_fixable: false

  QG-AX-DEEP-004:
    name: Design System Maturity Gate
    profiles: [full, web-next, web-spa]
    veto_conditions:
      - id: VC-DEEP-004-A
        condition: "Token migration has breaking changes without migration guide"
        available_check: "test -d tokens/ || test -f src/tokens.ts || test -f src/theme.ts"
        on_unavailable: SKIP_WITH_WARNING
        check: "Verify token rename/remove operations have corresponding migration guide with codemod or find-replace instructions"
        threshold: "Zero unguided breaking token changes"
        operator: manual_verification
        action: "VETO — Token breaking changes must include migration guide with automated codemod. See token-migration-strategy.md."
        auto_fixable: false

      - id: VC-DEEP-004-B
        condition: "Multi-brand theme override leaks base brand tokens"
        available_check: "test -d src/themes || test -f src/theme.ts"
        on_unavailable: SKIP_WITH_WARNING
        check: "Verify brand themes override ALL semantic tokens and no base-brand-specific values leak through to other brands"
        threshold: "Zero token leaks across brand boundaries"
        operator: manual_verification
        action: "VETO — Brand themes must be hermetic. No base brand token leaks. See multi-brand-theming.md."
        auto_fixable: false

      - id: VC-DEEP-004-C
        condition: "Design system component lacks documentation (props, variants, usage)"
        available_check: "test -d packages/ui/src/components || test -d src/components/ui"
        on_unavailable: SKIP_WITH_WARNING
        check: "Verify each DS component has JSDoc/TSDoc for all public props, Storybook stories covering all variants, and usage guidelines"
        threshold: "All DS components fully documented"
        operator: manual_verification
        action: "VETO — DS components must have complete documentation (props, variants, usage examples). See ds-documentation-automation.md."
        auto_fixable: false

  QG-AX-DEEP-005:
    name: React Patterns Gate
    profiles: [full, web-next, web-spa]
    veto_conditions:
      - id: VC-DEEP-005-A
        condition: "Server Component imports client-only module without 'use client' boundary"
        available_check: "test -d app/ || test -d src/app/"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'useState\\|useEffect\\|useRef\\|useContext\\|onClick\\|onChange' app/ --include='*.tsx' | grep -vl \"'use client'\" | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — Components using React hooks or event handlers must have 'use client' directive. See server-component-patterns.md."
        auto_fixable: false

      - id: VC-DEEP-005-B
        condition: "Suspense boundary missing for async data-fetching component"
        available_check: "test -d app/ || test -d src/app/"
        on_unavailable: SKIP_WITH_WARNING
        check: "Verify all async/data-fetching components are wrapped in Suspense boundaries with meaningful fallback UI"
        threshold: "Zero unwrapped async components"
        operator: manual_verification
        action: "VETO — Async components must be wrapped in Suspense with skeleton fallback. See suspense-architecture.md."
        auto_fixable: false

      - id: VC-DEEP-005-C
        condition: "Data fetching in client component instead of server component"
        available_check: "test -d app/ || test -d src/app/"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'useEffect.*fetch\\|useSWR\\|useQuery' app/ --include='*.tsx' | wc -l"
        threshold: 0
        operator: equals
        action: "VETO — Fetch data in Server Components or use server actions. Client-side fetching only for real-time data. See rsc-data-fetching.md."
        auto_fixable: false

      - id: VC-DEEP-005-D
        condition: "Custom hook without tests or JSDoc documentation"
        available_check: "test -d src/hooks || test -d packages/hooks"
        on_unavailable: SKIP_WITH_WARNING
        check: "For each custom hook file (use*.ts), verify corresponding test file exists and hook has JSDoc with @param, @returns, @example"
        threshold: "All custom hooks have tests and JSDoc"
        operator: manual_verification
        action: "VETO — Custom hooks must have unit tests and JSDoc documentation. See custom-hook-library.md."
        auto_fixable: false

      - id: VC-DEEP-005-E
        condition: "Form handles submission without validation, error display, or loading state"
        available_check: "test -d src/components || test -d packages/ui/src/components"
        on_unavailable: SKIP_WITH_WARNING
        check: "Review all form components for: schema validation (Zod/Yup), field-level error display, submit loading state, and error recovery"
        threshold: "All forms implement validation, error display, and loading state"
        operator: manual_verification
        action: "VETO — Forms must have validation, field-level errors, loading state, and error recovery. See form-architecture.md."
        auto_fixable: false

  QG-AX-DEEP-006:
    name: Error Resilience Gate
    profiles: [full, web-next, web-spa]
    veto_conditions:
      - id: VC-DEEP-006-A
        condition: "Error recovery UI does not provide actionable retry or fallback"
        available_check: "test -d src/components || test -d packages/ui/src/components"
        on_unavailable: SKIP_WITH_WARNING
        check: "Review error boundary fallback components for: clear error message, retry button, fallback content, and escalation path (e.g., contact support)"
        threshold: "All error boundaries provide actionable recovery (retry, navigate back, or contact)"
        operator: manual_verification
        action: "VETO — Error UX must provide actionable recovery options, not just 'Something went wrong'. See recovery-ux-patterns.md."
        auto_fixable: false

      - id: VC-DEEP-006-B
        condition: "App does not detect or handle offline state"
        available_check: "test -d src/ || test -d app/"
        on_unavailable: SKIP_WITH_WARNING
        check: "grep -rn 'navigator.onLine\\|online.*event\\|offline.*event\\|useOnlineStatus\\|NetInfo' src/ --include='*.tsx' --include='*.ts' | wc -l"
        threshold: 1
        operator: greater_or_equal
        action: "VETO — App must detect offline state and show appropriate UI (queued actions, cached data, reconnection indicator). See offline-detection-recovery.md."
        auto_fixable: false

      - id: VC-DEEP-006-C
        condition: "Failed mutation does not preserve user input for retry"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        check: "Review form submissions and mutations for: input preservation on failure, automatic retry with exponential backoff, and user notification of retry status"
        threshold: "All mutations preserve input and offer retry on failure"
        operator: manual_verification
        action: "VETO — Failed mutations must preserve user input and offer retry. Never discard user work. See recovery-ux-patterns.md."
        auto_fixable: false

# ==============================================================================
# WORKFLOW VETO CONDITIONS (Cross-cutting)
# ==============================================================================
workflow_veto_conditions:

  - id: VC-WF-001
    name: Agent Registry Validation
    trigger: "Before any workflow starts"
    condition: "Referenced agent does not exist in squad agent registry"
    available_check: "test -f squads/apex/data/agent-registry.yaml"
    on_unavailable: BLOCK
    check: |
      # Validate all agents referenced in workflow exist in squads/apex/data/agent-registry.yaml
      for agent in $(grep -oP 'agent:\s*\K\S+' {workflow_file}); do
        grep -q "id: $agent" squads/apex/data/agent-registry.yaml || exit 1
      done
    action: "VETO — Block workflow start. All referenced agents must exist in agent-registry.yaml."

  - id: VC-WF-002
    name: Prerequisites Check
    trigger: "Before workflow phase starts"
    condition: "Required input artifacts from previous phase do not exist"
    available_check: "manual"
    on_unavailable: MANUAL_CHECK
    check: "Validate artifacts_required list at each checkpoint"
    action: "VETO — Cannot start phase without all required artifacts from previous phase."

  - id: VC-WF-003
    name: Revision Loop Limit
    trigger: "When a phase attempts to loop back"
    condition: "Revision count exceeds max_iterations for that checkpoint"
    available_check: "manual"
    on_unavailable: MANUAL_CHECK
    check: "Counter tracked per checkpoint per story"
    action: "ESCALATE to apex-lead. Phase stuck in loop — requires intervention."
    max_iterations_default: 3

  - id: VC-WF-004
    name: Command Registry Validation
    trigger: "On squad activation or *apex-audit"
    condition: "Command listed in agent-registry.yaml does not exist in agent file"
    available_check: "test -f squads/apex/data/agent-registry.yaml"
    on_unavailable: SKIP_WITH_WARNING
    check: |
      For each agent in data/agent-registry.yaml:
        Read agent file from agents/{agent-id}.md
        Verify each listed command exists in the agent's commands section
    action: "WARN — Log mismatched commands for registry cleanup."

  - id: VC-WF-005
    name: Profile Agent Validation
    trigger: "On pipeline start"
    condition: "Pipeline references agent not active in current profile"
    available_check: "test -f squads/apex/squad.yaml"
    on_unavailable: SKIP_WITH_WARNING
    check: "Compare pipeline agent list against profile active agents"
    action: "SKIP agent steps for inactive agents. Log with reason."

  - id: VC-WF-006
    name: Agent File-to-Registry Parity
    trigger: "On squad activation or *apex-audit"
    condition: "Agent .md file exists in agents/ but is NOT listed in agent-registry.yaml"
    available_check: "test -d squads/apex/agents && test -f squads/apex/data/agent-registry.yaml"
    on_unavailable: SKIP_WITH_WARNING
    check: |
      # Reverse parity: every .md file in agents/ must have a matching id in registry
      for file in squads/apex/agents/*.md; do
        agent_id=$(basename "$file" .md)
        grep -q "id: $agent_id" squads/apex/data/agent-registry.yaml || echo "ORPHAN: $agent_id"
      done
      # Also check registry entries point to existing files
      for agent_id in $(grep -oP 'id:\s*\K\S+' squads/apex/data/agent-registry.yaml); do
        test -f "squads/apex/agents/${agent_id}.md" || echo "MISSING: $agent_id"
      done
    action: "WARN — Log orphan agents and missing files for registry cleanup. Parity must be 1:1."

  - id: VC-WF-007
    name: Rollback Safety Guard
    trigger: "Before *apex-rollback executes"
    condition: "No active pipeline state file exists"
    available_check: "test -d .aios/apex-pipeline/"
    on_unavailable: BLOCK
    check: "ls .aios/apex-pipeline/*.yaml 2>/dev/null | wc -l"
    action: "VETO — No pipeline to rollback. Nothing to restore."

  - id: VC-WF-008
    name: Rollback Checkpoint Validation
    trigger: "Before *apex-rollback restores a checkpoint"
    condition: "Target checkpoint was never completed"
    available_check: "manual"
    on_unavailable: MANUAL_CHECK
    check: "Verify target checkpoint status == completed in pipeline state"
    action: "VETO — Cannot rollback to an incomplete checkpoint. Only completed checkpoints are valid targets."

  - id: VC-WF-009
    name: Rollback User Confirmation
    trigger: "Before *apex-rollback modifies code"
    condition: "User has not confirmed rollback"
    available_check: "manual"
    on_unavailable: BLOCK
    check: "User must explicitly confirm rollback target"
    action: "VETO — Rollback is destructive. User confirmation required."

  - id: VC-WF-010
    name: Dry-Run Read-Only Guard
    trigger: "During *apex-dry-run execution"
    condition: "Dry-run attempts to modify files or create pipeline state"
    available_check: "manual"
    on_unavailable: BLOCK
    check: "No file writes, no state creation, no agent task execution"
    action: "VETO — Dry-run is read-only. Zero modifications allowed."

# ==============================================================================
# EXPEDITED MODE VETO CONDITIONS
# ==============================================================================
expedited_mode_veto_conditions:

  - id: VC-EXP-001
    condition: "Expedited mode activated without apex-lead approval"
    available_check: "manual"
    on_unavailable: MANUAL_CHECK
    action: "VETO — apex-lead must explicitly approve expedited mode before activation."

  - id: VC-EXP-002
    condition: "Attempt to skip non-skippable gate in expedited mode"
    available_check: "manual"
    on_unavailable: BLOCK
    never_skip:
      - QG-AX-001  # Design tokens
      - QG-AX-003  # Design spec approval
      - QG-AX-005  # Accessibility
      - QG-AX-007  # Performance budget
      - QG-AX-008  # Visual regression
      - QG-AX-009  # Cross-platform compatibility
      - QG-AX-010  # Lead sign-off
      - QG-AX-DEEP-005  # React patterns (SSR/RSC correctness)
      - QG-AX-DEEP-006  # Error resilience (crash prevention)
    may_skip_with_justification:
      - QG-AX-006  # Motion (non-blocking by default)
      - QG-AX-DEEP-001  # Interaction quality
      - QG-AX-DEEP-002  # i18n readiness
      - QG-AX-DEEP-003  # Architecture quality
      - QG-AX-DEEP-004  # Design system maturity
    action: "VETO — These gates cannot be skipped even in expedited mode."

# ==============================================================================
# ENFORCEMENT LEVELS
# ==============================================================================
enforcement:
  levels:
    - level: 1
      name: "CI Pipeline"
      description: "Automated checks run in CI. Failures block PR merge."
      gates: [QG-AX-005, QG-AX-007, QG-AX-008, QG-AX-009]

    - level: 2
      name: "Pre-commit Hook"
      description: "Checks run before git commit. Failures block commit."
      gates: [QG-AX-001, QG-AX-006]

    - level: 3
      name: "Workflow Blocker"
      description: "Checked at checkpoint transitions. Failures block phase."
      gates: [QG-AX-002, QG-AX-003, QG-AX-004, QG-AX-DEEP-003, QG-AX-DEEP-005, QG-AX-DEEP-006]

    - level: 4
      name: "Manual + Recorded"
      description: "Requires human approval recorded in artifact."
      gates: [QG-AX-010]

    - level: 5
      name: "Task-Level Quality"
      description: "Checked during task execution. Failures block task completion."
      gates: [QG-AX-DEEP-001, QG-AX-DEEP-002, QG-AX-DEEP-004]

# ==============================================================================
# DISCOVERY VETO CONDITIONS
# ==============================================================================
discovery_gates:
  - id: VC-DISC-COMP-001
    phase: discover-components
    condition: "No React component files found in project"
    action: "BLOCK — not a React project, discovery not applicable"
    blocking: true
    available_check: "glob src/**/*.tsx OR src/**/*.jsx returns results"
    on_unavailable: BLOCK
    profiles: [full, web-next, web-spa, minimal]

  - id: VC-DISC-COMP-002
    phase: discover-components
    condition: "Project has > 500 components"
    action: "WARN — large project, discovery may take a moment"
    blocking: false
    available_check: "glob src/**/*.tsx OR src/**/*.jsx returns results"
    on_unavailable: SKIP_WITH_WARNING
    profiles: [full, web-next, web-spa]

  - id: VC-DISC-DS-001
    phase: discover-design
    condition: "No CSS files, no Tailwind config, no theme files"
    action: "WARN — no design system detected, report as adhoc"
    blocking: false
    available_check: "CSS files OR tailwind.config.* OR theme.ts exists"
    on_unavailable: SKIP_WITH_WARNING
    fallback: "Report inline styles and className patterns as implicit tokens"
    profiles: [full, web-next, web-spa, minimal]

  - id: VC-DISC-DS-002
    phase: discover-design
    condition: "Project uses CSS-in-JS exclusively (no CSS/Tailwind)"
    action: "ADAPT — scan theme objects instead of CSS files"
    blocking: false
    available_check: "styled-components OR emotion in package.json"
    on_unavailable: SKIP_WITH_WARNING
    profiles: [full, web-next, web-spa]

  - id: VC-DISC-I18N-001
    phase: apex-i18n-audit
    condition: "No React component files found in project"
    action: "BLOCK — not a React project, i18n audit not applicable"
    blocking: true
    available_check: "glob src/**/*.tsx OR src/**/*.jsx returns results"
    on_unavailable: BLOCK
    profiles: [full, web-next, web-spa, minimal]

  - id: VC-DISC-I18N-002
    phase: apex-i18n-audit
    condition: "Concatenated strings used to build sentences"
    action: "WARN — Sentence structure changes per locale. Use template strings with placeholders."
    blocking: false
    available_check: "manual"
    on_unavailable: MANUAL_CHECK
    profiles: [full, web-next, web-spa]

  - id: VC-DISC-EB-001
    phase: apex-error-boundary
    condition: "No React component files found in project"
    action: "BLOCK — not a React project, error boundary audit not applicable"
    blocking: true
    available_check: "glob src/**/*.tsx OR src/**/*.jsx returns results"
    on_unavailable: BLOCK
    profiles: [full, web-next, web-spa, minimal]

  - id: VC-DISC-EB-002
    phase: apex-error-boundary
    condition: "Route has no error boundary in component tree"
    action: "VETO — Unhandled error in this route causes white screen of death. Must add boundary."
    blocking: true
    available_check: "manual"
    on_unavailable: MANUAL_CHECK
    profiles: [full, web-next, web-spa, minimal]

  # Routes Discovery Gates
  - id: VC-DISC-ROUTE-001
    gate: discovery_preflight
    condition: "Dead route detected (component does not exist)"
    action: VETO
    severity: HIGH
    blocking: true
    feeds_gate: null
    available_check: "manual"
    on_unavailable: MANUAL_CHECK

  # Dependencies Discovery Gates
  - id: VC-DISC-DEP-001
    gate: discovery_preflight
    condition: "Critical vulnerability found in production dependency"
    action: VETO
    severity: CRITICAL
    blocking: true
    feeds_gate: QG-AX-007
    available_check: "command:npm audit --json 2>/dev/null"
    on_unavailable: MANUAL_CHECK

  # Motion Discovery Gates
  - id: VC-DISC-MOTION-001
    gate: discovery_preflight
    condition: "No animation library or CSS animations detected"
    action: SKIP_WITH_WARNING
    severity: LOW
    blocking: false
    feeds_gate: QG-AX-006
    available_check: "manual"
    on_unavailable: SKIP_WITH_WARNING

  - id: VC-DISC-MOTION-002
    gate: discovery_preflight
    condition: "Animation without prefers-reduced-motion handling"
    action: WARN
    severity: HIGH
    blocking: false
    feeds_gate: QG-AX-005
    available_check: "manual"
    on_unavailable: MANUAL_CHECK

  # A11y Discovery Gates
  - id: VC-DISC-A11Y-001
    gate: discovery_preflight
    condition: "Keyboard trap detected (modal/drawer without escape or focus trap)"
    action: VETO
    severity: CRITICAL
    blocking: true
    feeds_gate: QG-AX-005
    available_check: "manual"
    on_unavailable: MANUAL_CHECK

  - id: VC-DISC-A11Y-002
    gate: discovery_preflight
    condition: "No interactive components found"
    action: ADAPT
    severity: LOW
    blocking: false
    feeds_gate: QG-AX-005
    available_check: "manual"
    on_unavailable: SKIP_WITH_WARNING

  # Performance Discovery Gates
  - id: VC-DISC-PERF-001
    gate: discovery_preflight
    condition: "First Load JS exceeds budget (>80KB gzipped)"
    action: WARN
    severity: HIGH
    blocking: false
    feeds_gate: QG-AX-007
    available_check: "command:npm run build 2>/dev/null"
    on_unavailable: MANUAL_CHECK

  - id: VC-DISC-PERF-002
    gate: discovery_preflight
    condition: "No build system configured"
    action: SKIP_WITH_WARNING
    severity: LOW
    blocking: false
    feeds_gate: null
    available_check: "test -f vite.config.ts -o -f vite.config.js -o -f next.config.js -o -f next.config.mjs"
    on_unavailable: SKIP_WITH_WARNING

  # State Discovery Gates
  - id: VC-DISC-STATE-001
    gate: discovery_preflight
    condition: "No React files found in project"
    action: BLOCK
    severity: HIGH
    blocking: true
    feeds_gate: null
    available_check: "test -d src/components || test -d src/ || test -d app/"
    on_unavailable: BLOCK

  - id: VC-DISC-STATE-002
    gate: discovery_preflight
    condition: "Context provider at root without useMemo on value"
    action: WARN
    severity: HIGH
    blocking: false
    feeds_gate: QG-AX-007
    available_check: "manual"
    on_unavailable: MANUAL_CHECK

  # Types Discovery Gates
  - id: VC-DISC-TYPES-001
    gate: discovery_preflight
    condition: "No tsconfig.json found (JavaScript project)"
    action: ADAPT
    severity: MEDIUM
    blocking: false
    feeds_gate: null
    available_check: "test -f tsconfig.json"
    on_unavailable: SKIP_WITH_WARNING

  - id: VC-DISC-TYPES-002
    gate: discovery_preflight
    condition: "strict mode disabled in tsconfig.json"
    action: WARN
    severity: HIGH
    blocking: false
    feeds_gate: QG-AX-010
    available_check: "test -f tsconfig.json"
    on_unavailable: SKIP_WITH_WARNING

  # Forms Discovery Gates
  - id: VC-DISC-FORMS-001
    gate: discovery_preflight
    condition: "No forms found in project"
    action: SKIP_WITH_WARNING
    severity: LOW
    blocking: false
    feeds_gate: null
    available_check: "manual"
    on_unavailable: SKIP_WITH_WARNING

  - id: VC-DISC-FORMS-002
    gate: discovery_preflight
    condition: "Form without any validation"
    action: WARN
    severity: HIGH
    blocking: false
    feeds_gate: null
    available_check: "manual"
    on_unavailable: MANUAL_CHECK

  # Security Discovery Gates
  - id: VC-DISC-SEC-001
    gate: discovery_preflight
    condition: "dangerouslySetInnerHTML found without DOMPurify sanitization"
    action: VETO
    severity: CRITICAL
    blocking: true
    feeds_gate: QG-AX-010
    available_check: "manual"
    on_unavailable: MANUAL_CHECK

  - id: VC-DISC-SEC-002
    gate: discovery_preflight
    condition: "Exposed API key or secret in source code"
    action: VETO
    severity: CRITICAL
    blocking: true
    feeds_gate: QG-AX-010
    available_check: "manual"
    on_unavailable: MANUAL_CHECK

# ==============================================================================
# RUNTIME PROTECTION — Fix Scope, Snapshots, Adherence, Handoff (v2.0.0)
# ==============================================================================
# Added by Pedro Valerio audit — prevents the 3 most common user complaints:
# 1. Agent modifies more than requested (scope creep)
# 2. Agent can't rollback to previous state (no snapshot)
# 3. Agent loses the original user request during handoff (interpretation drift)
# ==============================================================================

  # --- FIX SCOPE LOCK ---

  QG-AX-FIX-SCOPE:
    name: Fix Scope Lock Enforcement
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:

      - id: VC-FIX-SCOPE-001
        gate: fix_scope
        condition: "Files modified outside declared scope lock"
        action: VETO
        severity: HIGH
        blocking: true
        feeds_gate: QG-AX-FIX-002
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        remediation: "Revert out-of-scope changes. If other issues found, report as suggestions AFTER the fix."

      - id: VC-FIX-SCOPE-002
        gate: fix_scope
        condition: "Lines changed exceed 3x minimum necessary for the declared fix"
        action: WARN
        severity: MEDIUM
        blocking: false
        feeds_gate: QG-AX-FIX-002
        available_check: "manual"
        on_unavailable: SKIP_WITH_WARNING
        remediation: "Present diff to user before applying. Ask: 'Mudanças maiores que o esperado — aprovar?'"

  # --- SNAPSHOT PROTECTION ---

  QG-AX-SNAPSHOT:
    name: Pre-Modification Snapshot
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:

      - id: VC-SNAPSHOT-001
        gate: snapshot
        condition: "Fix started without file snapshot (git stash or patch backup)"
        action: VETO
        severity: HIGH
        blocking: true
        feeds_gate: null
        available_check: "git rev-parse --is-inside-work-tree"
        on_unavailable: SKIP_WITH_WARNING
        remediation: "Run 'git stash push -m apex-snapshot-{timestamp} -- {files}' before modifying."

  # --- REQUEST ADHERENCE ---

  QG-AX-FIX-002:
    name: Request Adherence Validation
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:

      - id: VC-FIX-ADHERENCE-001
        gate: fix_adherence
        condition: "Fix completed without comparing result against original user request"
        action: VETO
        severity: HIGH
        blocking: true
        feeds_gate: null
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        remediation: "Run adherence check: compare original_user_request vs actual diff before finalizing."

      - id: VC-FIX-ADHERENCE-002
        gate: fix_adherence
        condition: "Result does not match user's visual reference (screenshot provided but not compared)"
        action: WARN
        severity: MEDIUM
        blocking: false
        feeds_gate: null
        available_check: "manual"
        on_unavailable: SKIP_WITH_WARNING
        remediation: "Compare implementation against user's screenshot. Show side-by-side if possible."

  # --- HANDOFF INTEGRITY ---

  QG-AX-HANDOFF:
    name: Handoff Request Preservation
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:

      - id: VC-HANDOFF-001
        gate: handoff_integrity
        condition: "Agent handoff does not contain original_user_request verbatim"
        action: VETO
        severity: HIGH
        blocking: true
        feeds_gate: null
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        remediation: "Include exact user request text + any attachments (screenshots, URLs) in handoff context."

      - id: VC-HANDOFF-002
        gate: handoff_integrity
        condition: "User attachments (screenshots, URLs) not forwarded to specialist"
        action: WARN
        severity: MEDIUM
        blocking: false
        feeds_gate: null
        available_check: "manual"
        on_unavailable: SKIP_WITH_WARNING
        remediation: "Forward all user-provided visual references to the receiving agent."

  # --- CONTEXT WINDOW PROTECTION ---

  QG-AX-CONTEXT:
    name: Context Window Protection
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:

      - id: VC-CONTEXT-001
        gate: context_protection
        condition: "Intent chain exceeds 2 consecutive operations without explicit user confirmation to continue"
        action: WARN
        severity: LOW
        blocking: false
        feeds_gate: null
        available_check: "manual"
        on_unavailable: SKIP_WITH_WARNING
        remediation: "After 2 chains, change default option to 'Done'. User must explicitly choose to continue."

      - id: VC-CONTEXT-002
        gate: context_protection
        condition: "Agent persona file > 30KB loaded without modular lazy-loading"
        action: WARN
        severity: MEDIUM
        blocking: false
        feeds_gate: null
        available_check: "manual"
        on_unavailable: SKIP_WITH_WARNING
        remediation: "Split into core (< 30KB) + lazy-loaded modules. Load modules only when specific commands invoked."

  # --- INTENT CLARIFICATION (Non-Technical User Support) ---

  QG-AX-INTENT:
    name: Intent Clarification for Non-Technical Users
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:

      - id: VC-INTENT-001
        gate: intent_clarification
        condition: "Fix proceeds without user confirming intent translation (visual language)"
        action: VETO
        severity: HIGH
        blocking: true
        feeds_gate: null
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        remediation: "Translate request using vocabulary-bridge.yaml, present in visual language, get user 'sim' before proceeding."

      - id: VC-INTENT-002
        gate: intent_clarification
        condition: "Technical jargon used in user-facing confirmation (CSS properties, React terms, etc.)"
        action: WARN
        severity: MEDIUM
        blocking: false
        feeds_gate: null
        available_check: "manual"
        on_unavailable: SKIP_WITH_WARNING
        remediation: "Rephrase using visual descriptions from vocabulary-bridge.yaml. Describe what user will SEE, not what code will DO."

  # --- GREENFIELD PROJECT CREATION ---

  QG-AX-GREENFIELD:
    name: Greenfield Project Quality Gates
    profiles: [full, web-next, web-spa, minimal]
    veto_conditions:

      - id: VC-GREEN-001
        gate: greenfield
        condition: "Greenfield proceeds without user confirming project definition"
        action: VETO
        severity: HIGH
        blocking: true
        feeds_gate: null
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        remediation: "Present project definition in visual language, get user 'sim' before scaffolding."

      - id: VC-GREEN-002
        gate: greenfield
        condition: "Technical questions asked to user during greenfield (e.g., 'React or Vue?', 'Tailwind or CSS Modules?')"
        action: VETO
        severity: HIGH
        blocking: true
        feeds_gate: null
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        remediation: "Make technical decisions based on best practices. Present to user in visual language only."

      - id: VC-GREEN-003
        gate: greenfield
        condition: "Hardcoded values in any greenfield component (hex colors, px spacing, font-size literals)"
        action: VETO
        severity: HIGH
        blocking: true
        feeds_gate: QG-AX-001
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        remediation: "All values must reference design tokens defined in index.css :root."

      - id: VC-GREEN-006
        gate: greenfield
        condition: "Animation without prefers-reduced-motion fallback in greenfield project"
        action: VETO
        severity: HIGH
        blocking: true
        feeds_gate: QG-AX-005
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        remediation: "Every animation must have @media (prefers-reduced-motion: reduce) fallback."

      - id: VC-GREEN-007
        gate: greenfield
        condition: "Header not sticky by default in greenfield project"
        action: WARN
        severity: LOW
        blocking: false
        feeds_gate: null
        available_check: "manual"
        on_unavailable: SKIP_WITH_WARNING
        remediation: "Set position: sticky on header by default. Only remove if user explicitly requests it."

# ==============================================================================
# BRAND ASSET & ICON SYSTEM GATES
# ==============================================================================

  # === QG-AX-ASSET ===
  QG-AX-ASSET:
    name: Brand Asset Quality
    owner: design-sys-eng
    blocker: true
    profiles: [web-next, web-spa, full]
    checklist: checklists/brand-asset-standards.md
    veto_conditions:

      - id: VC-ASSET-001
        condition: "Asset used without license verification"
        check: "grep -r 'license' src/assets/ || test -f src/assets/licenses.json"
        available_check: "test -d src/assets/"
        on_unavailable: SKIP_WITH_WARNING
        threshold: "file_exists"
        operator: exit_code_equals
        action: "BLOCK: Asset {file} has no license verification. Add license info to src/assets/licenses.json or checklist."
        auto_fixable: false
        waivable: true

      - id: VC-ASSET-002
        condition: "SVG with >50 path nodes without simplification attempt"
        check: "manual_review"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        threshold: 50
        operator: less_than_or_equal
        action: "PAUSE: SVG {file} has {count} path nodes (limit: 50). Run SVGO or simplify geometry."
        auto_fixable: false
        waivable: true

      - id: VC-ASSET-003
        condition: "Brand colors not extracted to design tokens"
        check: "grep -r 'currentColor\\|var(--' {file}"
        available_check: "test -f {file}"
        on_unavailable: SKIP_WITH_WARNING
        threshold: 1
        operator: greater_than_or_equal
        action: "BLOCK: Asset {file} has brand colors not mapped to design tokens. Extract palette and create CSS variables."
        auto_fixable: false
        waivable: false

      - id: VC-ASSET-004
        condition: "No reduced-motion alternative for animated assets"
        check: "grep -l 'animate\\|animation\\|@keyframes' {file} && grep -l 'prefers-reduced-motion' {file}"
        available_check: "test -f {file}"
        on_unavailable: SKIP_WITH_WARNING
        threshold: 0
        operator: exit_code_equals
        action: "BLOCK: Animated asset {file} has no prefers-reduced-motion fallback."
        auto_fixable: false
        waivable: false

      - id: VC-ASSET-005
        condition: "Hardcoded colors in SVG not using currentColor or tokens"
        check: "grep -E 'fill=\"#|stroke=\"#|fill: #|stroke: #' {file} | grep -v 'currentColor\\|var(--'"
        available_check: "test -f {file}"
        on_unavailable: SKIP_WITH_WARNING
        threshold: 0
        operator: equals
        action: "PAUSE: SVG {file} has hardcoded colors. Replace with currentColor or CSS custom properties."
        auto_fixable: true
        waivable: true

      - id: VC-ASSET-006
        condition: "Asset exceeds 100KB without optimization"
        check: "test $(stat -f%z {file} 2>/dev/null || stat -c%s {file} 2>/dev/null) -lt 102400"
        available_check: "test -f {file}"
        on_unavailable: SKIP_WITH_WARNING
        threshold: 102400
        operator: less_than
        action: "BLOCK: Asset {file} is {size}KB (limit: 100KB). Run SVGO or image optimization."
        auto_fixable: true
        waivable: true

      - id: VC-ASSET-007
        condition: "Claiming pixel-perfect reproduction of complex brand logo (honesty gate)"
        check: "manual_review"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        threshold: "honest"
        operator: manual_review
        action: "BLOCK: Geometric recreation must be labeled 'inspired by', not 'pixel-perfect reproduction'. Complex logos cannot be faithfully reproduced as code-generated SVG."
        auto_fixable: false
        waivable: false

  # === QG-AX-ICON ===
  QG-AX-ICON:
    name: Icon System Quality
    owner: design-sys-eng
    blocker: true
    profiles: [web-next, web-spa, full]
    veto_conditions:

      - id: VC-ICON-001
        condition: "Icons without aria-label or aria-hidden"
        check: "grep -rn '<svg' src/ | grep -v 'aria-label\\|aria-hidden'"
        available_check: "test -d src/"
        on_unavailable: SKIP_WITH_WARNING
        threshold: 0
        operator: equals
        action: "BLOCK: Icon SVGs found without aria-label or aria-hidden. Decorative icons need aria-hidden='true', meaningful icons need aria-label."
        auto_fixable: true
        waivable: false

      - id: VC-ICON-002
        condition: "Inline SVG >5KB without tree-shaking setup"
        check: "manual_review"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        threshold: 5120
        operator: less_than
        action: "PAUSE: Inline SVG {file} exceeds 5KB. Configure tree-shaking or use sprite sheet."
        auto_fixable: false
        waivable: true

      - id: VC-ICON-003
        condition: "Icon color not using currentColor"
        check: "grep -rn 'fill=\"#\\|stroke=\"#' src/components/**/Icon* src/icons/ 2>/dev/null | grep -v currentColor"
        available_check: "test -d src/"
        on_unavailable: SKIP_WITH_WARNING
        threshold: 0
        operator: equals
        action: "PAUSE: Icon {file} uses hardcoded fill/stroke color. Use currentColor for theme compatibility."
        auto_fixable: true
        waivable: true

      - id: VC-ICON-004
        condition: "Mixed icon libraries without documented rationale"
        check: "manual_review"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        threshold: "documented"
        operator: manual_review
        action: "PAUSE: Multiple icon libraries detected. Document rationale in docs/decisions/ or consolidate to single library."
        auto_fixable: false
        waivable: true

      - id: VC-ICON-005
        condition: "Icons below 44x44 touch target without padding wrapper"
        check: "manual_review"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        threshold: 44
        operator: greater_than_or_equal
        action: "BLOCK: Interactive icon {element} has touch target below 44x44px (WCAG 2.5.8). Add padding wrapper or increase clickable area."
        auto_fixable: true
        waivable: false

  # ==========================================================================
  # QUALITY GATE: QG-AX-001 (Structure) — Additional conditions
  # ==========================================================================

  - gate: QG-AX-001
    id_prefix: VC-STRUCT
    conditions:
      - id: VC-STRUCT-001
        condition: "Hardcoded magic numbers in CSS (non-token px/rem values for spacing, sizing, z-index)"
        check: "grep_pattern"
        available_check: "grep -rn --include='*.css' --include='*.tsx' --include='*.jsx' '\\b[0-9]\\+px\\b' src/"
        on_unavailable: MANUAL_CHECK
        threshold: 0
        operator: equals
        action: "PAUSE: Hardcoded magic number detected in {file}:{line}. Extract to design token. Exception: only 0px (reset) and 1px (separator) are acceptable — document reason in file comment. apex-lead reviews on PR."
        auto_fixable: false
        waivable: true

  # ==========================================================================
  # QUALITY GATE: QG-AX-005 (Accessibility) — Additional conditions
  # ==========================================================================

  - gate: QG-AX-005
    id_prefix: VC-A11Y-EXT
    conditions:
      - id: VC-A11Y-EXT-001
        condition: "Invalid ARIA attributes without runtime error boundary"
        check: "manual_review"
        available_check: "manual"
        on_unavailable: MANUAL_CHECK
        threshold: 0
        operator: equals
        action: "BLOCK: Invalid ARIA attribute detected ({attribute} on {element}). Invalid ARIA is worse than no ARIA — remove or fix."
        auto_fixable: false
        waivable: false

  # ==========================================================================
