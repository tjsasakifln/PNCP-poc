  # Chain behavior rules
  chain_rules:
    - "User picks by number (1, 2, 3) — execute immediately"
    - "User types naturally — re-classify intent and route"
    - "User says 'done', 'pronto', 'so isso' — end chain gracefully"
    - "Max chain depth: 5 operations (prevent infinite loops)"
    - "Each chain step shows suggestions, NEVER auto-executes"

  # ============================================================================
  # HANDOFF DEPTH TRACKING
  # ============================================================================
  # Prevents infinite agent delegation loops. Each handoff increments depth.
  # At max depth, BLOCK further handoffs and escalate to apex-lead.
  # ============================================================================
  handoff_depth:
    max_depth: 5
    tracking:
      field: "handoff_depth"
      location: "In-memory counter, persisted in handoff artifact"
      initial_value: 0
      increment: "On every agent→agent delegation"
    enforcement:
      at_max_depth:
        action: "BLOCK further handoffs"
        message: "Max handoff depth ({max_depth}) reached. Escalating to apex-lead."
        escalation: "apex-lead reviews chain, decides: (1) complete current work, (2) reset depth and continue, (3) abort chain"
      warning_at: 4  # Warn at depth 4 that next handoff is the last
      warning_message: "Handoff depth {current}/5 — next handoff will trigger escalation."
    artifact_field:
      description: "Add handoff_depth to every handoff artifact YAML"
      schema: |
        handoff:
          from_agent: "{current}"
          to_agent: "{next}"
          handoff_depth: {N}  # Incremented from previous
          # ... rest of artifact

# ==============================================================================
# 2. SMART DEFAULTS — Parar de perguntar o obvio
# ==============================================================================

smart_defaults:
  description: >
    When the scanner already detected information that answers a question,
    USE that information as default instead of asking the user.

  rules:
    - question: "Qual componente?"
      smart_default:
        - if: "user mentioned component name that matches a file"
          answer: "{matching component}"
          confidence: high
          show: null
        - if: "only 1 component in scope"
          answer: "{that component}"
          confidence: high
          show: "Usando {component} (unico no escopo)."
        - if: "multiple components, no clear match"
          answer: null
          confidence: low
          ask: "Qual componente? {numbered list}"

    - question: "Pipeline completo ou quick?"
      smart_default:
        - if: "scope == 1 file, 1 domain"
          answer: "*apex-fix"
          confidence: high
          show: null
        - if: "scope <= 3 files"
          answer: "*apex-quick"
          confidence: high
          show: null
        - if: "scope > 3 files OR multi-domain"
          answer: "*apex-go"
          confidence: high
          show: null

    - question: "Qual agente?"
      smart_default:
        - if: "domain clearly maps to single agent in routing table"
          answer: "{routed agent}"
          confidence: high
          show: null
        - if: "multi-domain request"
          answer: "pipeline (multiple agents)"
          confidence: high
          show: null

    - question: "Print e interno ou externo?"
      smart_default:
        - if: "Image matches known project routes/components from scan cache"
          answer: "internal"
          confidence: high
          show: null
        - if: "User said 'quero assim', 'faz igual', 'olha esse app/site'"
          answer: "external"
          confidence: high
          show: null
        - if: "Unclear"
          answer: null
          confidence: low
          ask: "Esse print e do seu projeto atual ou de uma referencia externa?"

    - question: "Qual dimensao priorizar na analise?"
      smart_default:
        - if: "visual_analysis_history.priority_dimensions exists"
          answer: "{top priority dimension from history}"
          confidence: medium
          show: "Priorizando {dimension} (baseado no seu historico)."
        - if: "Project domain == healthcare"
          answer: "accessibility"
          confidence: medium
          show: "Healthcare: priorizando acessibilidade."
        - if: "No history"
          answer: null
          confidence: low
          show: null  # Analyze all dimensions equally

    - question: "Header position?"
      smart_default:
        - if: "creating header component OR greenfield project"
          answer: "position: sticky"
          confidence: high
          show: null
        - if: "user says 'fixo', 'nao sumir', 'grudado', 'sempre visivel'"
          answer: "position: sticky"
          confidence: high
          show: "Header sticky — fica visivel durante scroll."
        - if: "user explicitly says 'nao fixo', 'some junto', 'scroll junto'"
          answer: "position: relative (scrolls with page)"
          confidence: high
          show: "Header vai rolar junto com a pagina."

    - question: "Corrigir suggestion automaticamente?"
      smart_default:
        - if: "suggestion is LOW severity"
          answer: null
          confidence: low
          ask: "Suggestion LOW — quer aplicar?"
        - if: "suggestion is HIGH severity"
          answer: null
          confidence: medium
          show: "Suggestion HIGH encontrada. Quer que eu corrija?"

  display_rules:
    high_confidence: "Use default silently"
    medium_confidence: "Show default with brief explanation"
    low_confidence: "Ask the question, present options"

# ==============================================================================
# 3. CONTEXT MEMORY — "Ja escaneei esse projeto"
# ==============================================================================

context_memory:
  description: >
    Cache scan results, discovery data, and user preferences so the squad
    doesn't repeat work or ask the same questions twice.

  storage:
    location: ".aios/apex-context/"
    files:
      scan_cache: ".aios/apex-context/scan-cache.yaml"
      component_cache: ".aios/apex-context/component-cache.yaml"
      design_cache: ".aios/apex-context/design-cache.yaml"
      user_preferences: ".aios/apex-context/preferences.yaml"
    gitignore: true

  # ============================================================================
  # INVALIDATION DETECTION MECHANISM
  # ============================================================================
  # Caches are validated on ACCESS (lazy invalidation), not via file watchers.
  # On each cache read, the agent checks the detection_mechanism conditions.
  # If ANY condition is true, the cache is stale and a re-scan is triggered.
  # ============================================================================
  detection_mechanism:
    type: "mtime-comparison"
    description: >
      On cache read, compare the cache's `discovered_at` timestamp against
      the most recent mtime of files matching the invalidation glob patterns.
      If any file has mtime > discovered_at, cache is STALE.
    implementation: |
      function isCacheStale(cache, globPatterns):
        cacheTime = cache.discovered_at
        for pattern in globPatterns:
          files = glob(pattern)
          latestMtime = max(file.mtime for file in files)
          if latestMtime > cacheTime:
            return true
        return false
    fallback: "If glob fails or returns empty, treat cache as stale (safe default)"

  cache_rules:
    scan_results:
      store: "Full project_context from apex-scan"
      ttl: "Current session"
      invalidation_globs: ["package.json", "tailwind.config.*", "vite.config.*", "next.config.*"]
      invalidate_on:
        - "package.json modified"
        - "tailwind.config.* modified"
        - "User runs *apex-scan explicitly"

    component_discovery:
      store:
        total_components: N
        component_list: "[{name, path, type, loc}]"
        orphaned: "[{names}]"
        untested: "[{names}]"
        health_score: N
        discovered_at: "{ISO 8601}"
      ttl: "Until src/ files change (mtime-based)"
      invalidation_globs: ["src/**/*.tsx", "src/**/*.jsx", "app/**/*.tsx", "app/**/*.jsx", "packages/**/src/**/*.tsx"]
      invalidate_on:
        - "Any .tsx/.jsx file created, deleted, or modified"
        - "User runs *discover-components explicitly"

    design_discovery:
      store:
        ds_score: N
        design_language: "{type}"
        violations_count: N
        token_inventory: "{colors, spacing, typography}"
        discovered_at: "{ISO 8601}"
      ttl: "Until CSS/config files change"
      invalidation_globs: ["src/**/*.css", "src/**/*.css.ts", "tailwind.config.*", "src/**/theme.*", "packages/tokens/**"]
      invalidate_on:
        - "Any .css file modified"
        - "tailwind.config.* modified"
        - "User runs *discover-design explicitly"

    visual_analysis_history:
      store:
        analyses: "[{timestamp, source, scope, avg_score, user_choice, key_preferences}]"
        rejected_suggestions: "[{suggestion, reason}]"
        approved_styles: "[{preset_id, dimensions_approved}]"
        reference_images: "[{label, extracted_tokens}]"
      ttl: "Persistent across sessions"
      invalidate_on:
        - "User runs *apex-scan explicitly"
        - "Manual clear"
      max_entries: 20
      purpose: >
        Track what the user likes/dislikes across visual analyses.
        Use to improve future suggestions — if user rejected "brutalist"
        twice, stop suggesting it. If user always picks "improve a11y",
        prioritize accessibility in future analyses.

    route_discovery:
      store:
        total_routes: N
        route_list: "[{path, component, layout, lazy, seo_status}]"
        orphan_routes: "[{paths}]"
        dead_routes: "[{paths}]"
        seo_gaps: "[{paths}]"
        route_health: N
        discovered_at: "{ISO 8601}"
      ttl: "Until router config or pages directory changes"
      invalidation_globs: ["src/App.tsx", "src/routes.*", "src/pages/**", "app/**/page.tsx", "app/**/layout.tsx"]
      invalidate_on:
        - "Router config file modified"
        - "Page component created or deleted"
        - "User runs *discover-routes explicitly"

    dependency_health:
      store:
        total_deps: N
        outdated: "[{name, installed, latest}]"
        vulnerable: "[{name, severity, advisory}]"
        heavy: "[{name, size, alternative}]"
        unused: "[{names}]"
        dep_health: N
        discovered_at: "{ISO 8601}"
      ttl: "Until package.json or lock file changes"
      invalidation_globs: ["package.json", "package-lock.json", "yarn.lock", "pnpm-lock.yaml", "bun.lockb"]
      invalidate_on:
        - "package.json modified"
        - "Lock file modified"
        - "User runs *discover-dependencies explicitly"

    motion_discovery:
      store:
        total_animations: N
        animation_list: "[{component, type, library, trigger}]"
        veto_violations: N
        missing_reduced_motion: "[{components}]"
        css_transitions_interactive: "[{components}]"
        motion_health: N
        discovered_at: "{ISO 8601}"
      ttl: "Until component or CSS files change"
      invalidation_globs: ["src/**/*.tsx", "src/**/*.jsx", "src/**/*.css", "src/**/*.css.ts"]
      invalidate_on:
        - "Any .tsx/.jsx/.css file with animation patterns modified"
        - "User runs *discover-motion explicitly"

    a11y_discovery:
      store:
        components_scanned: N
        issues_by_category: "{category: count}"
        worst_offenders: "[{component, issue_count}]"
        a11y_health: N
        discovered_at: "{ISO 8601}"
      ttl: "Until component files change"
      invalidation_globs: ["src/**/*.tsx", "src/**/*.jsx", "app/**/*.tsx"]
      invalidate_on:
        - "Any .tsx/.jsx file modified"
        - "User runs *discover-a11y explicitly"

    performance_discovery:
      store:
        components_scanned: N
        heaviest_components: "[{name, loc, weight}]"
        lazy_gaps: N
        image_issues: N
        rerender_risks: N
        cwv_risks: N
        perf_health: N
        discovered_at: "{ISO 8601}"
      ttl: "Until src/ or config files change"
      invalidation_globs: ["src/**/*.tsx", "src/**/*.jsx", "package.json", "vite.config.*", "next.config.*"]
      invalidate_on:
        - "Any .tsx/.jsx file modified"
        - "package.json or build config modified"
        - "User runs *discover-performance explicitly"

    state_discovery:
      store:
        state_health: N
        context_providers: N
        prop_drilling_chains: N
        context_no_slice: N
        discovered_at: "{ISO 8601}"
      ttl: "Until component files change"
      invalidation_globs: ["src/**/*.tsx", "src/**/*.jsx", "package.json"]
      invalidate_on:
        - "Any .tsx/.jsx file modified"
        - "package.json modified (state lib added/removed)"
        - "User runs *discover-state explicitly"

    types_discovery:
      store:
        type_health: N
        any_count: N
        ts_nocheck_count: N
        type_coverage_percent: N
        discovered_at: "{ISO 8601}"
      ttl: "Until TypeScript files or config change"
      invalidation_globs: ["src/**/*.ts", "src/**/*.tsx", "tsconfig.json"]
      invalidate_on:
        - "Any .ts/.tsx file modified"
        - "tsconfig.json modified"
        - "User runs *discover-types explicitly"

    forms_discovery:
      store:
        form_health: N
        total_forms: N
        double_submit_risks: N
        form_a11y_issues: N
        discovered_at: "{ISO 8601}"
      ttl: "Until component files change"
      invalidation_globs: ["src/**/*.tsx", "src/**/*.jsx"]
      invalidate_on:
        - "Any .tsx/.jsx file modified"
        - "User runs *discover-forms explicitly"

    security_discovery:
      store:
        security_health: N
        xss_vectors: N
        exposed_secrets: N
        discovered_at: "{ISO 8601}"
      ttl: "Until source files or env change"
      invalidation_globs: ["src/**/*.ts", "src/**/*.tsx", "src/**/*.js", "src/**/*.jsx", ".env*"]
      invalidate_on:
        - "Any source file modified"
        - ".env files modified"
        - "User runs *discover-security explicitly"

    user_preferences:
      store:
        preferred_pipeline: "{apex-go | apex-quick | apex-fix}"
        preferred_style_direction: "{preset_ids user approved}"
        rejected_style_direction: "{preset_ids user rejected}"
        priority_dimensions: "[{dimension, weight}]"
        last_operation: "{operation + timestamp}"
      ttl: "Persistent across sessions"

  resume:
    on_session_start: |
      1. Check .aios/apex-context/ for cached state
      2. If component cache exists and valid:
         - Show: "Component inventory carregado ({total} components, health {score}/100)"
      3. If design cache exists and valid:
         - Show: "Design system cache carregado (DS Score {score}/100)"
      4. If no cache: run apex-scan silently

  cleanup:
    manual: "*apex-scan (forces re-scan, clears caches)"
    auto: "Remove caches older than 7 days"
    retention_enforcement:
      trigger: "On session start (after resume check)"
      rules:
        - condition: "Cache file mtime > 7 days"
          action: "Delete cache file silently"
        - condition: "Discovery output count > retention limit (10 per type)"
          action: "Delete oldest files beyond retention limit"
        - condition: "Total cache directory size > 5MB"
          action: "Delete oldest caches until under 5MB, warn user"
      log: ".aios/apex-context/cleanup.log"
      note: "Cleanup runs automatically — never blocks operations"
