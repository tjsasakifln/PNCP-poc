# Kaizen v2 — Patterns Database
# Schema: Master database of verified patterns with forgetting curve decay scores
# Updated: (auto-managed by memory-keeper agent)
# Owner: memory-keeper agent

# PATTERN LIFECYCLE
# ================
# 1. OBSERVED    — Sighting in daily, candidate for extraction
# 2. EXTRACTED   — Pattern meets all 5 extraction criteria, decay_score=1.0
# 3. REINFORCED  — Pattern sighted again, days_since_observed reset to 0
# 4. FADING      — decay_score 0.1-0.5, archive warning appears in briefing
# 5. ARCHIVED    — decay_score < 0.1, moved to archive/ (moved on compact-archive)
# 6. DELETED     — decay_score < 0.05, removed from system (deleted on compact-archive)

# DECAY FORMULA
# =============
# decay_score(t) = e^(-rate × days_since_observed)
#
# rate = 0.05 (general patterns, forget in ~60 days to score 0.05)
# rate = 0.025 (verified patterns, forget in ~120 days to score 0.05)

# FIELDS (required per pattern)
# =============================
# pattern_id:              Unique identifier (p001, p002, ...)
# name:                    Human-readable pattern name
# first_observed:          ISO date when first sighting occurred
# last_reinforced:         ISO date when last re-observed (reset decay)
# days_since_observed:     days = today - last_reinforced
# decay_score:             1.0 = fresh, 0.0 = dead. e^(-rate × days)
# verified:                true/false — observed 2+ times or in trusted sources
# verification_count:      Number of independent sightings
# heuristic:               The pattern itself (what to remember)
# context:                 Where/when pattern applies (trigger conditions)
# suggested_trigger:       When to apply this pattern (if X, then Y)

# ═══════════════════════════════════════════════════════════════════════════════
# PATTERNS
# ═══════════════════════════════════════════════════════════════════════════════

patterns: []

