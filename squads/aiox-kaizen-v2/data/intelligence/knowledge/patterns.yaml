    - "NON_OBVIOUS: Not already in docs/ OR contradicts belief"
    - "REUSABLE: Applicable to >1 scenario in project"
    - "ACTIONABLE: Has trigger condition + action (when→then)"
    - "EMPIRICAL: Based on observation, not speculation"

  next_compact_archive: null  # Run compact-archive every 90 days
