# Workflow: Full Ecosystem Analysis
# ID: wf-ecosystem-analysis
# Version: 1.0.0
# Purpose: Orchestrate all 6 Kaizen Squad agents for comprehensive ecosystem analysis
# Orchestrator: kaizen-chief
# Mode: Autonomous (YOLO)

workflow_name: full_ecosystem_analysis
description: >-
  Orchestrate all 6 Kaizen Squad agents for comprehensive ecosystem analysis.
  Executes in 5 phases: data collection, Tier 0 diagnosis (parallel), Tier 1 analysis
  (parallel), Tier 2 cost specialist, and synthesis with RULE-RD-001 enforcement.
agent_sequence:
  - kaizen-chief  # Phase 0: data collection (worker)
  - topology-analyst    # Phase 1: parallel with performance-tracker
  - performance-tracker # Phase 1: parallel with topology-analyst
  - bottleneck-hunter   # Phase 2a: parallel with capability-mapper
  - capability-mapper   # Phase 2a: parallel with bottleneck-hunter
  - tech-radar          # Phase 2b: sequential (depends on capability_report from 2a)
  - cost-analyst        # Phase 3: sequential
  - kaizen-chief  # Phase 4: synthesis and report
phase_checkpoints:
  QG-KZ-001: "Phase 0 data collection complete (squad_list, active_squads, agent_counts)"
  QG-KZ-001.5: "Phase 0.5 autonomy & output quality audit complete"
  QG-KZ-002: "Phase 1 Tier 0 diagnosis complete (topology + performance reports)"
success_indicators:
  - "Report has all 6 dimensions analyzed"
  - "Max 5 prioritized recommendations (RULE-RD-001: N>=3 enforced)"
  - "Each recommendation has evidence + action + cost + ROI"
  - "All phase checkpoints (QG-KZ-001, QG-KZ-001.5, QG-KZ-002) passed"

workflow:
  id: wf-ecosystem-analysis
  name: "Full Ecosystem Analysis"
  version: "1.0.0"
  orchestrator: kaizen-chief
  mode: autonomous
  estimated_duration: "10-20 minutes"

  triggers:
    proactive:
      - event: "git commit in squads/"
        cadence: "on change"
      - event: "weekly schedule"
        cadence: "every Sunday 20:00 BRT"
    reactive:
      - command: "*analyze"

  phases:

    # ═══════════════════════════════════════════════════════════════════════════
    # PHASE 0: DATA COLLECTION
    # ═══════════════════════════════════════════════════════════════════════════
    phase_0:
      name: "Data Collection"
      executor: worker
      duration: "1-2 minutes"
      checkpoint: "QG-KZ-001"

      steps:
        - id: "0.1"
          name: "Scan squad registry"
          action: "Read squads/squad-creator/data/squad-registry.yaml"
          output: "squad_list"

        - id: "0.2"
          name: "Scan active squads"
          action: "Glob squads/*/config/*.yaml"
          output: "active_squads"

        - id: "0.3"
          name: "Count agents per squad"
          action: "Glob squads/*/agents/*.md per squad"
          output: "agent_counts"

        - id: "0.4"
          name: "Scan stories/epics"
          action: "Glob docs/stories/*.md + docs/prd/*.md"
          output: "stories_epics"

        - id: "0.5"
          name: "Collect recent git activity"
          action: "git log --oneline -50"
          output: "recent_changes"

      checkpoint_criteria:
        - "squad_list retrieved"
        - "active_squads scanned"
        - "agent_counts calculated"
      veto_conditions:
        - "IF no squads found → ABORT with 'Empty ecosystem'"

    # ═══════════════════════════════════════════════════════════════════════════
    # PHASE 0.5: AUTONOMY + OUTPUT QUALITY (parallel, deterministic)
    # Added: 2026-03-01 (Google SOC learnings)
    # ═══════════════════════════════════════════════════════════════════════════
    phase_0_5:
      name: "Autonomy & Output Quality Audit"
      execution: parallel
      duration: "30 seconds"
      checkpoint: "QG-KZ-001.5"

      steps:
        - id: "0.5.1"
          name: "Audit autonomy levels"
          action: "Agent executes task: squads/kaizen-v2/tasks/health-check.md (autonomy section)"
          executor: worker
          output: "autonomy_report"

        - id: "0.5.2"
          name: "Audit output quality"
          action: "Agent executes task: squads/kaizen-v2/tasks/audit-output-quality.md"
          executor: worker
          output: "output_quality_report"

        - id: "0.5.3"
          name: "Run auto-healing gate"
          action: "Agent executes task: squads/kaizen-v2/tasks/auto-healing-gate.md"
          executor: worker
          output: "healing_report"

      checkpoint_criteria:
        - "autonomy_report has all squads scored"
        - "output_quality_report has at least 5 outputs audited"
        - "healing_report generated (PASS or NEEDS_REVIEW)"

    # ═══════════════════════════════════════════════════════════════════════════
    # PHASE 1: TIER 0 DIAGNOSIS (parallel)
    # ═══════════════════════════════════════════════════════════════════════════
    phase_1:
      name: "Tier 0 Diagnosis"
      execution: parallel
      duration: "3-5 minutes"
      checkpoint: "QG-KZ-002"

      agents:
        - agent: topology-analyst
          task: "Analyze squad structure, types, interaction modes, cognitive load"
          input: "phase_0 outputs"
          output: "topology_report"
          framework: "Team Topologies (4 types + 3 modes + cognitive load)"

        - agent: performance-tracker
          task: "Calculate DORA metrics, BSC perspectives, OKR status per squad"
          input: "phase_0 outputs + historical data"
          output: "performance_report"
          framework: "DORA + BSC + OKR"

      checkpoint_criteria:
        - "topology_report has squad type assignments"
        - "performance_report has DORA metrics per squad"
        - "Both reports have findings with evidence"
      veto_conditions:
        - "IF topology_report is empty → RETRY once, then ABORT"
        - "IF performance data unavailable → SKIP metrics, note in report"

    # ═══════════════════════════════════════════════════════════════════════════
    # PHASE 2: TIER 1 ANALYSIS (parallel)
    # ═══════════════════════════════════════════════════════════════════════════
    phase_2a:
      name: "Tier 1 Analysis (parallel)"
      execution: parallel
      duration: "2-3 minutes"
      depends_on: phase_1

      agents:
        - agent: bottleneck-hunter
          task: "Identify system constraints using TOC 5 Focusing Steps"
          input: "topology_report + performance_report"
          output: "bottleneck_report"
          framework: "TOC + OMTM"

        - agent: capability-mapper
          task: "Map capabilities, identify gaps, recommend resources"
          input: "phase_0 outputs + topology_report"
          output: "capability_report"
          framework: "Wardley Maps + 4R Model"

      checkpoint_criteria:
        - "bottleneck_report identifies top constraint"
        - "capability_report lists gaps with recommendations"

    phase_2b:
      name: "Tier 1 Analysis (sequential — depends on capability_report)"
      execution: sequential
      duration: "1-2 minutes"
      depends_on: phase_2a

      agents:
        - agent: tech-radar
          task: "Evaluate tools/APIs/MCPs, update radar, run fitness functions"
          input:
            - "phase_0 outputs"
            - "capability_report"
            - "current_radar: data/radar/initial-radar.yaml"
            - "tool_usage_data: performance_report.usage_metrics"
          output: "radar_report"
          framework: "Technology Radar + Fitness Functions"

      checkpoint_criteria:
        - "radar_report has updated quadrants"

    # ═══════════════════════════════════════════════════════════════════════════
    # PHASE 3: TIER 2 SPECIALIST
    # ═══════════════════════════════════════════════════════════════════════════
    phase_3:
      name: "Tier 2 Cost Analysis"
      execution: sequential
      duration: "2-3 minutes"
      depends_on: phase_2b

      agents:
        - agent: cost-analyst
          task: "Calculate costs, ROI per squad, identify waste"
          input:
            - "tool_inventory: radar_report.quadrants"
            - "usage_metrics: performance_report.usage_metrics"
            - "previous_reports: [topology_report, performance_report, bottleneck_report, capability_report, radar_report]"
          output: "cost_report"
          framework: "FinOps + BSC Financial Perspective"

      checkpoint_criteria:
        - "cost_report has spend per squad"
        - "ROI calculated for each recommendation"

    # ═══════════════════════════════════════════════════════════════════════════
    # PHASE 4: SYNTHESIS & REPORT
    # ═══════════════════════════════════════════════════════════════════════════
    phase_4:
      name: "Synthesis & Report Generation"
      executor: kaizen-chief
      duration: "2-3 minutes"
      depends_on: phase_3

      steps:
        - id: "4.0"
          name: "Systemic Validation (Lozano 7-point)"
          action: |
            Before synthesizing, validate ecosystem coherence using
            squads/kaizen-v2/checklists/analysis-quality-checklist.md
            section "Validação Sistêmica (7 Pontos)" + "Stress Test Mental (3 Inputs)".
            Any items failing become findings in the unified list.
          reference: "squads/kaizen-v2/checklists/analysis-quality-checklist.md"
          output: "systemic_validation_findings"

        - id: "4.1"
          name: "Merge all findings"
          action: "Combine 6 reports + systemic_validation_findings into unified findings list"

        - id: "4.1.5"
          name: "Enforce RULE-RD-001 (N<3 validation + GATE-RD)"
          action: |
            For each finding in unified list:
            1. Classify each evidence item into one of the 4 types from rules/recommendation-defensibility.md:
               - Métrica objetiva (quantitative data)
               - Padrão observado (pattern across multiple sources)
               - Sinal fraco (single occurrence, qualitative)
               - Especulação (no direct evidence)
            2. Count N = number of independent evidence items of allowed types (exclude Especulação)
            3. IF N >= 3 → KEEP as actionable finding
            4. IF N < 3 → DOWNGRADE level to MONITORAR (do NOT promote to recommendation)
            5. Execute GATE-RD 5-point checklist (from rules/recommendation-defensibility.md) per finding:
               - Attach result: {gateRdStatus: PASS|FAIL, timestamp, details}
            6. Log all downgrades: "{finding} downgraded: N={N}, sources={list}"
          veto: "IF any recommendation with N<3 or gateRdStatus=FAIL passes to step 4.3 → BLOCK and re-run 4.1.5"
          output: "validated_findings with evidence_classifications and gate_rd_results (only N>=3 AND GATE-RD PASS proceed to ranking)"

        - id: "4.2"
          name: "Rank by impact"
          action: "Score each validated finding: impact (1-10) x urgency (1-10) x feasibility (1-10)"
          criteria: "Top 5 by composite score"
          input: "validated_findings from 4.1.5 (pre-filtered by N>=3)"

        - id: "4.3"
          name: "Generate recommendations"
          action: "For each top finding: action + evidence + cost + ROI"

        - id: "4.4"
          name: "Format report"
          action: "Apply templates/weekly-report-tmpl.md"
          output: "Weekly Kaizen Report"

        - id: "4.5"
          name: "Save report"
          action: "Write to data/reports/week-{N}-{date}.md"

      checkpoint_criteria:
        - "Report has all 6 dimensions"
        - "Max 5 prioritized recommendations"
        - "Each recommendation has evidence + action + cost"
      veto_conditions:
        - "IF any recommendation lacks evidence → REMOVE from report"
        - "IF >5 recommendations → CUT lowest impact"

  # Output
  output:
    primary: "data/reports/week-{N}-{date}.md"
    format: "Weekly Kaizen Report (Markdown)"
    distribution:
      - "Display to user"
      - "Save to data/reports/"

  # Error Handling
  error_handling:
    agent_timeout:
      threshold: "5 minutes per agent"
      action: "Skip agent, note gap in report"
    agent_failure:
      action: "Retry once, then skip with note"
    data_unavailable:
      action: "Report with available data, note gaps"
