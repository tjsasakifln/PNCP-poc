name: "Migration Check (Post-Merge Alert)"

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily at 06:00 UTC — catch unapplied migrations even without pushes
    - cron: '0 6 * * *'
    # Daily at 03:00 UTC — STORY-414 AC3: schema contract drift detection
    - cron: '0 3 * * *'
  # NOTE: PR checks moved to migration-gate.yml (CRIT-050) — warns instead of blocking

permissions:
  contents: read

jobs:
  check-migrations:
    name: Check Unapplied Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check for unapplied migrations
        run: |
          echo "Checking migration status..."
          OUTPUT=$(supabase migration list --linked 2>&1)
          echo "$OUTPUT"

          # Detect unapplied migrations: rows with Local value but empty Remote
          # Supabase CLI outputs table with "Local | Remote | Time" columns
          # An unapplied migration has content in Local but nothing in Remote
          UNAPPLIED=$(echo "$OUTPUT" | awk -F'|' '
            NR > 2 {
              local = $1; gsub(/^[ \t]+|[ \t]+$/, "", local)
              remote = $2; gsub(/^[ \t]+|[ \t]+$/, "", remote)
              if (local != "" && remote == "") print local
            }
          ')

          # Also check for explicit "Not applied" text (older CLI versions)
          if [ -n "$UNAPPLIED" ] || echo "$OUTPUT" | grep -q "Not applied"; then
            echo ""
            echo "::error::Found unapplied migrations!"
            if [ -n "$UNAPPLIED" ]; then
              echo "Unapplied migrations:"
              echo "$UNAPPLIED"
            fi
            echo ""
            echo "To fix this:"
            echo "  1. export SUPABASE_ACCESS_TOKEN=<your-token>"
            echo "  2. supabase link --project-ref <project-ref>"
            echo "  3. supabase db push --include-all"
            echo ""
            echo "This check prevents CRIT-039/CRIT-045 recurrence."
            exit 1
          fi

          echo "All migrations are applied to production."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # STORY-414 AC3: Validate schema contract after confirming migrations are applied.
      # Exits 1 if critical columns are missing — prevents drift from reaching prod silently.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Supabase Python client
        run: pip install supabase --quiet

      - name: Validate schema contract
        id: schema_contract
        run: |
          set +e
          python -m backend.schemas.contract --validate 2>&1 | tee /tmp/schema_contract_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          cat /tmp/schema_contract_output.txt

          if [ "$EXIT_CODE" -eq 1 ]; then
            # Extract missing column names for GITHUB_OUTPUT (comma-separated)
            MISSING=$(grep "^  - " /tmp/schema_contract_output.txt \
              | sed 's/^  - //' | tr '\n' ',' | sed 's/,$//')
            echo "has_violations=true" >> "$GITHUB_OUTPUT"
            echo "missing=${MISSING}" >> "$GITHUB_OUTPUT"
            echo "::error::SCHEMA CONTRACT VIOLATED — missing: ${MISSING}"
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "has_violations=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Schema contract check skipped (config error — check SUPABASE secrets)."
            # Config errors are non-fatal: missing secrets in forks/dependabot
            EXIT_CODE=0
          else
            echo "has_violations=false" >> "$GITHUB_OUTPUT"
          fi

          exit $EXIT_CODE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
