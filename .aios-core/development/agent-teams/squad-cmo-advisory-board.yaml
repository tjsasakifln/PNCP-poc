    icon: "\U0001F50D"
    perspective: >
      SEO técnico, content strategy, pillar pages, long-tail keywords, topical
      authority, blog SEO, link building orgânico, SERP features, AI Overviews.
      "Esse conteúdo rankeia para a busca que o ICP faz?"
    representatives:
      - Rand Fishkin (SparkToro/ex-Moz) — audience research, anti-vanity metrics
      - Brian Dean (Backlinko/Semrush) — skyscraper technique, link building
      - Aleyda Solis (Orainti) — international SEO, technical SEO
      - Cyrus Shepard (Zyppy) — CTR optimization, title tags, SERP
      - Lily Ray (Amsive Digital) — E-E-A-T, Google algorithm updates, YMYL
      - Ross Hudgens (Siege Media) — content-driven SEO, digital PR
      - Kevin Indig (ex-Shopify/Atlassian) — SEO strategy, programmatic SEO

  # Cluster 2 — Product-Led Growth (7 CMOs)
  - name: Product-Led Growth
    icon: "\U0001F680"
    perspective: >
      Self-serve onboarding, freemium, viral loops, activation metrics,
      time-to-value, feature virality, expansion revenue, PLG flywheel.
      "O produto se vende sozinho? O usuário entrega valor para outros usuários?"
    representatives:
      - Elena Verna (ex-Dropbox/Miro/Amplitude) — PLG + sales-assisted hybrid
      - Wes Bush (ProductLed) — PLG framework, bowling alley framework
      - Kyle Poyar (OpenView) — usage-based pricing, PLG metrics
      - Kieran Flanagan (ex-HubSpot) — freemium to enterprise PLG
      - Leah Tharin (PLG advisor) — product-led sales, activation loops
      - Ramli John (Appcues) — product onboarding, activation playbook
      - Hila Qu (ex-GitLab/Acorns) — growth experimentation, PLG analytics

  # Cluster 3 — Community & Ecosystem (6 CMOs)
  - name: Community & Ecosystem
    icon: "\U0001F91D"
    perspective: >
      Community building, developer/user advocacy, forums, user groups,
      partnerships, co-marketing, marketplace effects, ecosystem moats.
      "Existe uma comunidade que defende e evangeliza o produto?"
    representatives:
      - Mary Thengvall (Camunda) — developer relations, community strategy
      - Jono Bacon (community strategist) — community architecture, governance
      - Patrick Woods (Orbit) — community-led growth, engagement metrics
      - David Spinks (Bevy/CMX) — community-led growth framework
      - Evan Hamilton (ex-Reddit/HubSpot) — community programs at scale
      - Lloyde Lobo (Boast.AI) — community-led growth for B2B SaaS

  # Cluster 4 — Viral & Referral Growth (7 CMOs)
  - name: Viral & Referral Growth
    icon: "\U0001F4A5"
    perspective: >
      Referral programs, word-of-mouth, network effects, viral coefficient (K),
      growth loops, gamification, NPS-driven growth, incentive design.
      "Cada novo usuário traz quantos outros? O loop é auto-sustentável?"
    representatives:
      - Andrew Chen (a16z) — network effects, viral growth, cold start problem
      - Sean Ellis (GrowthHackers) — growth hacking origin, OMTM, ICE framework
      - Nir Eyal (author, Hooked) — habit loops, variable rewards, engagement
      - Gustaf Alströmer (YC) — startup growth patterns, referral optimization
      - Morgan Brown (ex-Shopify) — growth frameworks, cross-functional growth
      - Yuriy Timen (ex-Grammarly) — viral PLG growth, freemium virality
      - Darius Contractor (growth advisor) — growth loops, retention curves

  # Cluster 5 — B2B/GovTech Go-to-Market (7 CMOs)
