      "A empresa pública confia e entende o valor em 30 segundos?"
    representatives:
      - Jon Miller (Demandbase) — ABM inventor, B2B demand gen
      - Sangram Vajre (GTM Partners) — go-to-market framework, ABM
      - Chris Walker (Refine Labs) — demand creation vs capture, dark social
      - Dave Gerhardt (Exit Five) — B2B marketing community, brand building
      - April Dunford (Obviously Awesome) — positioning, category design
      - Latané Conant (6sense) — intent-based marketing, predictive analytics
      - Mark Roberge (ex-HubSpot CRO) — scientific sales, inbound sales

  # Cluster 6 — Brand, Positioning & Thought Leadership (6 CMOs)
  - name: Brand & Thought Leadership
    icon: "\U0001F3AF"
    perspective: >
      Brand narrative, thought leadership, PR orgânico, media relations,
