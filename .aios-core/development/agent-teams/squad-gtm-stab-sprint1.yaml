    dev:
      - "Prepare STAB-009 FE branch while waiting for gate_1"
      - "Review STAB-004 AC5+AC6 implementation needs"
    sm:
      - "AM: Sprint kickoff (15min)"
      - "PM: Update tracker after gate_1"
    gate: "GATE 1 — Infra Ready (EOD sign-off)"

  day_2:
    theme: "Async Search — Kill the 524s"
    dev:
      - "Full day: STAB-009 FE migration (useSearch.ts → polling) — 4h"
      - "STAB-004 AC5+AC6 (never lose data, never 5xx with data) — 2h"
    architect:
      - "Review STAB-009 implementation (polling pattern, backward compat) — 1h"
    qa:
      - "Smoke test after each dev push"
      - "Run frontend test suite (regression) — 30min"
    devops:
      - "Monitor Railway logs for Redis stability"
      - "Verify worker uptime (should be >12h by now)"
    sm:
      - "Daily sync (15min)"
      - "Track impediments"

  day_3:
    theme: "Validate + SSE Resilience Start"
    dev:
      - "AM: STAB-003 timeout validation in prod (10 buscas × 4 UFs) — 2h"
      - "PM: Start STAB-006 SSE resilience (humanized errors) — 3h"
    architect:
      - "Review STAB-006 design (reconnect strategy, localStorage) — 1h"
    qa:
      - "AM: Gate 2 validation (async + timeout + partial results) — 3h"
      - "PM: Regression after STAB-003 changes"
    devops:
      - "Monitor async search in prod (202 responses, polling latency)"
    sm:
      - "Daily sync (15min)"
      - "Gate 2 sign-off facilitation"
    gate: "GATE 2 — Zero 524s + Async (EOD sign-off)"

  day_4:
    theme: "SSE Resilience Completion"
    dev:
      - "Full day: Complete STAB-006 (auto-reconnect, localStorage partial, Sentry noise) — 4h"
    qa:
      - "Test SSE reconnect scenarios (disconnect, timeout, partial)"
      - "Verify Sentry noise reduction (19 → 0 'failed to pipe')"
      - "Run full test suite (both backend + frontend)"
    devops:
      - "Prepare STAB-008 monitoring configs (UptimeRobot, Sentry rules)"
    architect:
      - "Final review of all changes, ADR drafts"
    sm:
      - "Daily sync (15min)"
      - "Risk assessment for day 5"

  day_5:
    theme: "Monitoring + Final Validation + Sprint Close"
    devops:
      - "AM: Configure UptimeRobot + Sentry alert rules (STAB-008) — 2h"
      - "PM: Deploy all pending changes to prod"
    qa:
      - "AM: Gate 3 full validation — 3h"
      - "PM: Smoke test Playwright (login → busca → resultado → download)"
      - "PM: Final regression (full suite both sides)"
    architect:
      - "Record ADRs (async pattern, Redis migration, timeout chain)"
    dev:
      - "Bugfixes from gate 3 validation (if any)"
    sm:
      - "Gate 3 sign-off facilitation"
      - "Sprint retrospective"
      - "Update GTM-STAB-000 tracker → Sprint 1 DONE"
      - "Handoff document for Sprint 2"
    gate: "GATE 3 — Operational Maturity (EOD sign-off)"

# ════════════════════════════════════════════════════════════════
# SUCCESS CRITERIA
# ════════════════════════════════════════════════════════════════

success_criteria:
  hard_requirements:
    - metric: zero_524_errors
      description: "10 buscas consecutivas com 4 UFs = 0 erros 524"
      threshold: 0
    - metric: async_response_time
      description: "POST /buscar retorna 202 em <1s"
      threshold: "< 1000ms"
    - metric: result_delivery
      description: "Resultado completo via polling em <60s"
      threshold: "< 60s"
    - metric: arq_worker_uptime
      description: "ARQ worker alive >24h sem crash"
      threshold: "> 24h"
    - metric: sentry_unresolved
      description: "Sentry unresolved issues"
      threshold: 0
    - metric: test_suite_backend
      description: "pytest full suite zero failures"
      threshold: "0 failures (5419+ pass)"
    - metric: test_suite_frontend
      description: "npm test full suite zero failures"
      threshold: "0 failures (2681+ pass)"

  soft_requirements:
    - metric: cache_hit_time
      description: "Busca cached (segunda tentativa)"
      threshold: "< 2s"
    - metric: uptimerobot_uptime
      description: "UptimeRobot verde por 24h"
      threshold: "> 99%"
    - metric: sse_reconnect
      description: "SSE reconnect funcional após disconnect"
      threshold: "true"

# ════════════════════════════════════════════════════════════════
# RISK REGISTER
# ════════════════════════════════════════════════════════════════

risks:
  - id: R1
    description: "Migration `supabase db push` fails in prod"
    probability: low
    impact: critical
    mitigation: "Test on staging first. Have rollback SQL ready. Supabase support on speed-dial."
    owner: devops

  - id: R2
    description: "Upstash Redis connectivity issues (ssl, latency)"
    probability: medium
    impact: high
    mitigation: "Keep Railway Redis as fallback. Test ssl=True with redis-py 5.x before cutover."
    owner: devops

  - id: R3
    description: "Async search FE migration breaks existing flow"
    probability: medium
    impact: high
    mitigation: "Feature flag SEARCH_ASYNC_ENABLED. Rollback in <60s. Backward compat tested."
    owner: dev

  - id: R4
    description: "Test baseline broken by infra changes"
    probability: low
    impact: high
    mitigation: "Run full suite after every change. Stop sprint if baseline broken."
    owner: qa

  - id: R5
    description: "Railway deploy timeout during sprint"
    probability: low
    impact: medium
    mitigation: "Blue-green deploy pattern. Rollback to previous build."
    owner: devops

