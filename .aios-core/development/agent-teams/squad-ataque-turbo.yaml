# ═══════════════════════════════════════════════════════════════════
# APIs E CURL COMMANDS (REFERÊNCIA TÉCNICA)
# ═══════════════════════════════════════════════════════════════════

api_reference:
  pncp:
    base_url: "https://pncp.gov.br/api/consulta/v1"
    max_page_size: 50  # CRÍTICO: >50 retorna HTTP 400
    date_format: "YYYYMMDD"

    endpoints:
      search_open_tenders: |
        # Buscar editais abertos (publicações recentes)
        curl -s "https://pncp.gov.br/api/consulta/v1/contratacoes/publicacao\
          ?dataInicial={YYYYMMDD}\
          &dataFinal={YYYYMMDD}\
          &pagina=1\
          &tamanhoPagina=50" | python -m json.tool

      contracts_bulk: |
        # Contratos publicados em período (tamanhoPagina max 500 — diferente de contratacoes!)
        # ATENÇÃO: NÃO existe filtro cnpjFornecedor. Filtrar client-side por niFornecedor.
        curl -s "https://pncp.gov.br/api/consulta/v1/contratos\
          ?dataInicial={YYYYMMDD}\
          &dataFinal={YYYYMMDD}\
          &pagina=1\
          &tamanhoPagina=500" | python -m json.tool

        # Filtrar por fornecedor client-side:
        # data['data'][i]['niFornecedor'] == CNPJ_ALVO

      procurement_detail: |
        # Detalhe de uma compra específica
        curl -s "https://pncp.gov.br/api/consulta/v1/orgaos/{CNPJ_ORGAO}/compras/{ANO}/{SEQUENCIAL}" \
          | python -m json.tool

      procurement_items: |
        # Itens de uma compra (com detalhes dos objetos)
        curl -s "https://pncp.gov.br/api/consulta/v1/orgaos/{CNPJ_ORGAO}/compras/{ANO}/{SEQUENCIAL}/itens?pagina=1" \
          | python -m json.tool

      item_results: |
        # Resultados/vencedores de um item (API de Manutenção — /api/pncp/, não /api/consulta/)
        curl -s "https://pncp.gov.br/api/pncp/v1/orgaos/{CNPJ_ORGAO}/compras/{ANO}/{SEQUENCIAL}/itens/{NUM_ITEM}/resultados" \
          | python -m json.tool
        # Retorna: niFornecedor, nomeRazaoSocialFornecedor, valorTotalHomologado, porteFornecedorNome

      items_maintenance: |
        # Itens via API de Manutenção (inclui temResultado e situacaoCompraItemNome)
        curl -s "https://pncp.gov.br/api/pncp/v1/orgaos/{CNPJ_ORGAO}/compras/{ANO}/{SEQUENCIAL}/itens?pagina=1" \
          | python -m json.tool
        # situacaoCompraItem: 1=Aberto, 2=Homologado, 3=Deserto, 5=Fracassado

    link_construction: |
      URL do edital no portal:
        https://pncp.gov.br/app/editais/{CNPJ_ORGAO}/{ANO}/{SEQUENCIAL}

      Construção a partir de numeroControlePNCP (formato: {CNPJ}-{TIPO}-{SEQ_PADDED}/{ANO}):
        1. Split por "/" → [antes, ano]
        2. Split antes por "-" → [cnpj, tipo, sequencial]
        3. Strip leading zeros do sequencial
        4. URL: https://pncp.gov.br/app/editais/{cnpj}/{ano}/{sequencial_sem_zeros}

      Prioridade de link:
        1. linkSistemaOrigem (86% preenchido)
        2. linkProcessoEletronico (sempre vazio, defensive fallback)
        3. URL construída via numeroControlePNCP (14% dos registros)

      Já implementado em: backend/search_pipeline.py → _build_pncp_link()

    key_response_fields: |
      Publicações (editais abertos):
        - numeroControlePNCP: identificador único
        - orgaoEntidade.cnpj: CNPJ do órgão
        - orgaoEntidade.razaoSocial: nome do órgão
        - objetoCompra: descrição do objeto
        - valorTotalEstimado: valor estimado
        - anoCompra, sequencialCompra: para construir link
        - dataAberturaProposta: PRAZO PARA PROPOSTAS (CRÍTICO — incluir no email!)
        - dataPublicacaoPncp: data de publicação do edital
        - modalidadeNome: modalidade da licitação
        - unidadeOrgao.ufSigla: UF
        - linkSistemaOrigem: link externo do edital

      Contratos (histórico de vitórias):
        - niFornecedor: CNPJ do fornecedor
        - nomeRazaoSocialFornecedor: nome do fornecedor
        - objetoContrato: objeto contratado
        - valorGlobal: valor do contrato
        - orgaoEntidade.razaoSocial: órgão contratante
        - dataAssinatura: data da assinatura

  receita_federal:
    primary_api: "OpenCNPJ (melhor para batch — 50 req/s, sem auth)"
    fallback_api: "BrasilAPI (3-5 req/s, sem auth)"

    endpoints:
      opencnpj: |
        # RECOMENDADO para batch (50 req/s, sem autenticação)
        curl -s "https://api.opencnpj.org/{CNPJ_SEM_PONTUACAO}" | python -m json.tool

      brasilapi: |
        # Fallback (3-5 req/s)
        curl -s "https://brasilapi.com.br/api/cnpj/v1/{CNPJ_SEM_PONTUACAO}" | python -m json.tool

    key_response_fields: |
      - razao_social: nome oficial da empresa
      - nome_fantasia: nome comercial
      - cnae_principal / cnae_fiscal: atividade econômica principal
      - cnaes_secundarios: atividades secundárias
      - porte_empresa / porte: MEI, ME, EPP, DEMAIS
      - capital_social: capital social (proxy de porte financeiro)
      - situacao_cadastral: ATIVA, BAIXADA, etc.
      - logradouro, municipio, uf: endereço
      - email, telefones: contato
      - qsa: quadro societário (nomes dos sócios e qualificação)

    revenue_estimation: |
      IMPORTANTE: Nenhuma API pública fornece faturamento real.
      Proxies disponíveis:
      - capital_social: indicador de porte (correlação moderada com faturamento)
      - porte: MEI (< R$81K/ano), ME (< R$360K), EPP (< R$4.8M), DEMAIS (> R$4.8M)
      - Volume de contratos PNCP: soma de valorGlobal nos últimos 12 meses
      - Volume de contratos ComprasGov: soma adicional de fontes complementares
      - Nº de funcionários: não disponível publicamente
      O @analyst deve usar porte + volume TOTAL de contratos (todas as fontes) como proxy.

  # ───────────────────────────────────────────────────────────────
  # FONTES COMPLEMENTARES (ALÉM DO PNCP)
  # ───────────────────────────────────────────────────────────────

  comprasgov_v3:
    description: "ComprasGov v3 — Dados Abertos (Portal de Compras Governamentais)"
    base_url: "https://dadosabertos.compras.gov.br"
    status: |
      🚫 FORA DO AR (confirmado 2026-03-03): Homepage inteira retorna HTTP 404.
      Não é problema de auth — a API está completamente indisponível.
      Última verificação: 2026-03-03 via Playwright (site retorna JSON 404).
      NÃO USAR até nova verificação. Revisitar em 2 semanas.
    auth: |
      JWT Token obrigatório. Registrar em dadosabertos.compras.gov.br e fazer login:
      POST /usuarios/criar (registro) → POST /autenticacao/login (JWT)
      Header: Authorization: Bearer {JWT_TOKEN}
      Sem auth, endpoints retornam 404.
    coverage: "Federal (compras.gov.br — licitações federais)"
    priority: 99  # DESATIVADA — site fora do ar desde 2026-03-02

    endpoints:
      search_supplier: |
        # MELHOR ENTRADA: buscar fornecedor por CNPJ ou CNAE
        # Retorna dados cadastrais + histórico do fornecedor no ComprasGov
        curl -s "https://dadosabertos.compras.gov.br/modulo-fornecedor/1_consultarFornecedor\
          ?cnpj-cpf={CNPJ_SEM_PONTUACAO}" | python -m json.tool

        # Busca por CNAE (útil para descobrir fornecedores de um setor):
        curl -s "https://dadosabertos.compras.gov.br/modulo-fornecedor/1_consultarFornecedor\
          ?natureza-juridica-fornecedor={CODIGO_CNAE}" | python -m json.tool

      award_results: |
        # Resultados de itens de contratações Lei 14.133 (com vencedores)
        curl -s "https://dadosabertos.compras.gov.br/modulo-contratacoes/\
          3_consultarResultadoItensContratacoes_PNCP_14133\
          ?pagina=1&tamanhoPagina=50" | python -m json.tool

        # Filtros disponíveis: dataResultado, codigoUasg, etc.
        # Retorna: cnpjFornecedor, nomeRazaoSocial, valorUnitarioHomologado

      procurement_items: |
        # Itens de contratações com detalhes
        curl -s "https://dadosabertos.compras.gov.br/modulo-contratacoes/\
          2_consultarItensContratacoes_PNCP_14133\
          ?pagina=1&tamanhoPagina=50" | python -m json.tool

    key_fields: |
      Fornecedor: cnpj, razaoSocial, uf, cnae, habilitado
      Resultado: cnpjFornecedor, valorUnitarioHomologado, quantidade, dataResultado

  portal_transparencia:
    description: "Portal da Transparência — API de Contratos e Licitações Federais"
    base_url: "https://api.portaldatransparencia.gov.br/api-de-dados"
    status: |
      ✅ VERIFICADO FUNCIONANDO (2026-03-03). Token configurado em backend/.env.
      Env var: PORTAL_TRANSPARENCIA_API_KEY (32 chars, prefixo ccbd...).
      Testado com sucesso: /pessoa-juridica, /contratos/cpf-cnpj, /licitacoes/modalidades.
    auth: |
      Token obrigatório (já configurado em backend/.env)
      Header: chave-api-dados: {TOKEN}
      Rate limit: 90 req/min (06h-01h), 450 req/min (01h-06h)
      Carregar token: PT_KEY=$(grep PORTAL_TRANSPARENCIA_API_KEY backend/.env | cut -d '=' -f2 | tr -d '"' | tr -d "'")
    coverage: "Federal — contratos, licitações, sanções, despesas"
    priority: 3  # Terceira fonte (promovida — ComprasGov v3 está fora do ar)

    endpoints:
      # ── ENDPOINT ESTRELA: check de sanções em 1 call ──
      sanctions_check: |
        # MELHOR ENDPOINT PARA QUALIFICAÇÃO: retorna flags booleanas de TODAS as bases
        # sancionadoCEIS, sancionadoCNEP, sancionadoCEPIM, sancionadoCEAF
        # MAIS CONFIÁVEL que queries individuais /ceis e /cnep (que retornam resultados genéricos)
        # USAR ESTE em vez do TCU certidões para check de sanções
        curl -s -H "chave-api-dados: $PT_KEY" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/pessoa-juridica\
          ?cnpj={CNPJ_SEM_PONTUACAO}"

        # Resposta inclui:
        # cnpj, razaoSocial, nomeFantasia
        # sancionadoCEIS: true/false (Cadastro de Empresas Inidôneas e Suspensas)
        # sancionadoCNEP: true/false (Cadastro Nacional de Empresas Punidas)
        # sancionadoCEPIM: true/false (Cadastro de Entidades Privadas sem fins lucrativos Impedidas)
        # sancionadoCEAF: true/false (Cadastro de Expulsões da Administração Federal)
        # possuiContratacao: true/false (tem contratos federais)
        # participanteLicitacao: true/false (já participou de licitações federais)
        # favorecidoDespesas: true/false (recebeu pagamentos federais)
        #
        # REGRA: se QUALQUER sanção = true → DESCARTAR lead imediatamente
        # BÔNUS: possuiContratacao e participanteLicitacao indicam presença federal

      contracts_by_supplier: |
        # OURO PARA PROSPECÇÃO: contratos por CNPJ do fornecedor (endpoint dedicado!)
        # Retorna histórico completo de contratos federais — objeto, valores, órgãos, datas
        curl -s -H "chave-api-dados: $PT_KEY" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/contratos/cpf-cnpj\
          ?cpfCnpj={CNPJ_SEM_PONTUACAO}\
          &pagina=1"

        # Campos-chave por contrato:
        # id, numero, objeto, fundamentoLegal, situacaoContrato, modalidadeCompra
        # compra: { numero, objeto, numeroProcesso, contatoResponsavel }
        # unidadeGestora: { codigo, nome, orgaoVinculado: { sigla, nome } }
        # fornecedor: { cnpjFormatado, nome, razaoSocialReceita, nomeFantasiaReceita, tipo }
        # dataAssinatura, dataInicioVigencia, dataFimVigencia
        # valorInicialCompra, valorFinalCompra
        #
        # IMPORTANTE: contatoResponsavel no campo compra = nome do responsável no órgão

      contracts_by_organ: |
        # Contratos por órgão + período (requer codigoOrgao obrigatório)
        curl -s -H "chave-api-dados: $PT_KEY" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/contratos\
          ?codigoOrgao={CODIGO_ORGAO}\
          &dataInicial={DD/MM/AAAA}&dataFinal={DD/MM/AAAA}\
          &pagina=1"
        # ATENÇÃO: codigoOrgao é OBRIGATÓRIO (sem ele → HTTP 400)

      open_tenders: |
        # Licitações por órgão + período (max 1 mês por query)
        curl -s -H "chave-api-dados: $PT_KEY" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/licitacoes\
          ?codigoOrgao={CODIGO_ORGAO}\
          &dataInicial={DD/MM/AAAA}&dataFinal={DD/MM/AAAA}\
          &pagina=1"
        # ATENÇÃO: codigoOrgao OBRIGATÓRIO + período máximo 1 mês

      bid_participants: |
        # Participantes de uma licitação (quem competiu, quem venceu)
        curl -s -H "chave-api-dados: $PT_KEY" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/licitacoes/participantes\
          ?codigoUG={CODIGO_UG}&numero={NUMERO}&codigoModalidade={COD_MOD}\
          &pagina=1"

      modalities: |
        # Lista de modalidades de licitação (códigos de referência)
        curl -s -H "chave-api-dados: $PT_KEY" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/licitacoes/modalidades"
        # Retorna: 1=Convite, 2=Tomada, 3=Concorrência, 5=Pregão, 6=Dispensa, 7=Inexigibilidade...

    key_fields: |
      pessoa-juridica: cnpj, razaoSocial, sancionadoCEIS/CNEP/CEPIM/CEAF (booleans), possuiContratacao
      Contratos: id, numero, objeto, fornecedor(cnpj,nome), valorInicialCompra, valorFinalCompra,
                 unidadeGestora(codigo,nome,orgaoVinculado), dataAssinatura, compra.contatoResponsavel
      Licitações: modalidade, objeto, valorEstimado, orgao, situacao
      Participantes: fornecedor, resultado (vencedor/perdedor), valor proposto

    notes: |
      ✅ Token CONFIGURADO e TESTADO (2026-03-03).
      Swagger: https://api.portaldatransparencia.gov.br/swagger-ui/index.html
      Rate limit: 90 req/min (06h-01h), 450 req/min (01h-06h)
      LIMITAÇÃO: /contratos e /licitacoes exigem codigoOrgao (não dá para buscar "todos os órgãos").
      WORKAROUND: usar /contratos/cpf-cnpj (busca por fornecedor, SEM restrição de órgão).
      /pessoa-juridica é o check mais rápido e confiável de sanções (1 call, flags booleanas).

  compras_dados_legacy:
    description: "Compras.dados.gov.br — API Legacy de Fornecedores"
    base_url: "https://compras.dados.gov.br"
    auth: "Nenhuma (dados abertos)"
    coverage: "Federal (cadastro ComprasNet)"
    priority: 5  # Quinta fonte (legacy)

    endpoints:
      suppliers_by_uf: |
        # Fornecedores cadastrados por UF
        curl -s "https://compras.dados.gov.br/fornecedores/v1/fornecedores.json\
          ?uf={UF_SIGLA}" | python -m json.tool

        # Fornecedores habilitados com filtro
        curl -s "https://compras.dados.gov.br/fornecedores/v1/fornecedores.json\
          ?cnpj={CNPJ_SEM_PONTUACAO}" | python -m json.tool

    key_fields: |
      cnpj, nome, uf, habilitado, ativo
      HATEOAS: links para navegação de resultados

    notes: |
      API REST + HATEOAS. Útil para validar se fornecedor está cadastrado
      no ComprasNet. Dados limitados — usar como complemento, não fonte primária.

  tcu:
    description: "TCU — Tribunal de Contas da União (3 APIs verificadas, sem auth)"
    auth: "Nenhuma (totalmente público)"
    coverage: "Federal (contratos TCU + certidões multi-registro + inabilitados)"
    priority: 2  # Alta prioridade — verificada e sem auth

    endpoints:
      contracts: |
        # Contratos do TCU (3.835+ registros, sem auth, VERIFICADO FUNCIONANDO)
        # Inclui CNPJ e nome do fornecedor, objeto, valores, datas
        curl -s "https://contas.tcu.gov.br/contrata2RS/api/publico/termos-contratuais" \
          | python -m json.tool

        # Campos-chave:
        # cnpjFornecedor, nomeFornecedor, objeto, valorInicial, valorAtualizado,
        # modalidadeLicitacao, unidadeGestora, dataAssinatura, numeroProcesso,
        # dataInicioVigencia, dataTerminoVigencia, numeroAditamentos

      certidoes: |
        # JOIA PARA QUALIFICAÇÃO: certidão consolidada multi-registro por CNPJ
        # Uma única chamada verifica TCU, CNJ, CEIS (sanções), CNEP
        # Sem auth, VERIFICADO FUNCIONANDO
        curl -s "https://certidoes-apf.apps.tcu.gov.br/api/rest/publico/certidoes/{CNPJ_SEM_PONTUACAO}" \
          | python -m json.tool

        # Resposta inclui:
        # razaoSocial, nomeFantasia, cnpj
        # certidoes[]: array de certificados de múltiplos registros
        #   - cada certidão tem "situacao": "NADA_CONSTA" (limpo) ou registro de sanção
        #   - fontes: TCU, CNJ, Portal da Transparência (CEIS, CNEP)
        #
        # USAR PARA: descartar leads sancionados ANTES de gastar tempo com investigação

      inabilitados: |
        # Lista de pessoas inabilitadas (impedidas de participar de licitações)
        # Sem auth, VERIFICADO FUNCIONANDO
        curl -s "https://contas.tcu.gov.br/ords/condenacao/consulta/inabilitados" \
          | python -m json.tool

        # Por CPF específico:
        curl -s "https://contas.tcu.gov.br/ords/condenacao/consulta/inabilitados/{CPF}" \
          | python -m json.tool

        # Campos: nome, cpf, processo, deliberacao, data_transito_julgado, data_final, uf, municipio
        # USAR PARA: verificar se sócios do QSA estão impedidos

    qualification_workflow: |
      WORKFLOW DE QUALIFICAÇÃO (2 camadas — executar para cada lead):

      CAMADA 1 — Portal da Transparência /pessoa-juridica (PREFERENCIAL):
        curl -s -H "chave-api-dados: $PT_KEY" \
          "https://api.portaldatransparencia.gov.br/api-de-dados/pessoa-juridica?cnpj={CNPJ}"
        → Retorna flags booleanas: sancionadoCEIS, sancionadoCNEP, sancionadoCEPIM, sancionadoCEAF
        → Se QUALQUER = true → DESCARTAR imediatamente
        → Mais confiável que queries individuais /ceis e /cnep (que retornam resultados não filtrados)
        → BÔNUS: possuiContratacao, participanteLicitacao (indicadores de presença federal)

      CAMADA 2 — TCU Inabilitados (complementar):
        → Verificar sócios do QSA (via OpenCNPJ) contra lista TCU de inabilitados
        curl -s "https://contas.tcu.gov.br/ords/condenacao/consulta/inabilitados/{CPF_SOCIO}"
        → Se sócio-administrador inabilitado → DESCARTAR lead

      Se lead passa nas 2 camadas → prosseguir para investigação CSI.

  # ───────────────────────────────────────────────────────────────
  # ESTRATÉGIA DE DEDUP CROSS-SOURCE
  # ───────────────────────────────────────────────────────────────

  dedup_strategy:
    description: |
      Licitações e contratos podem aparecer em múltiplas fontes (PNCP,
      ComprasGov, Portal da Transparência). Dedup obrigatório para não
      contar o mesmo edital duas vezes e não incluir duplicatas no email.

    algorithm: |
      DEDUP DE 2 CAMADAS (adaptado de backend/consolidation.py):

      Tier 1 — Chave Estruturada (prioridade):
        {cnpj_orgao}:{numero_edital_or_contrato}:{ano}
        Cobertura: ~85% dos registros (quando número do edital disponível)

      Tier 2 — Fallback por Conteúdo (quando Tier 1 falha):
        {cnpj_orgao}:{MD5(objeto_resumido)[:12]}:{valor_or_data}
        Cobertura: ~15% restantes (registros sem número padronizado)

      Dedup de Vencedores/Contratos:
        {cnpj_buyer}:{procurement_id}:{ano}:{cnpj_winner}
        Garante que o mesmo contrato de um mesmo fornecedor não é duplicado.

    source_priority: |
      Quando mesmo edital/contrato aparece em múltiplas fontes, manter o de maior prioridade:
        1. PNCP (mais completo, link oficial funcional, fed+estadual+municipal)
        2. TCU Contratos (verificado, sem auth, mas limitado a contratos do TCU)
        3. Portal da Transparência (✅ token configurado, contratos federais detalhados)
        4. Compras.dados.gov.br legacy (menor granularidade, intermitente)
        — ComprasGov v3: DESATIVADO (fora do ar desde 2026-03-02)

      Exceção: se a fonte de menor prioridade tem mais dados (ex: valor estimado
      preenchido vs ausente), ENRIQUECER o registro de maior prioridade com esses dados.

    implementation_notes: |
      - Normalizar CNPJ: remover pontuação, strip leading zeros
      - Normalizar objeto: lowercase, remover acentos, strip whitespace extra
      - Log discrepâncias >5% de valor entre fontes (sinal de dados inconsistentes)
      - Manter campo `fontes: ["PNCP", "ComprasGov"]` no registro final (mostra cobertura)

# ═══════════════════════════════════════════════════════════════════
# WORKFLOW DE EXECUÇÃO (5 FASES)
# ═══════════════════════════════════════════════════════════════════

coordination:
  lead_agent: analyst
  quality_philosophy: |
    VOLUME QUALIFICADO > PERFECCIONISMO. Cada lead recebe investigação
    suficiente para personalizar o email de forma crível (20-30 min/lead).
    Melhor 15 leads com emails bons do que 3 leads com emails perfeitos
    que ninguém responde. Estatisticamente, com 5-6% reply rate, precisamos
    de volume para gerar a primeira conversão. Cruzar PNCP + Portal da
    Transparência + OpenCNPJ é suficiente (sem CSI de 4 horas por lead).

  execution_sequence:
    - phase: 1_discovery
      name: "Descoberta Multi-Fonte de Vencedores Frequentes"
      agents: [data-engineer, dev]
      deliverable: |
        Para cada setor de interesse:
        1. Query PNCP /contratos com filtros de data (últimos 12 meses) — tamanhoPagina=500
        2. Query Portal da Transparência /contratos/cpf-cnpj para CNPJs encontrados no step 1
           (enriquece com contratos federais adicionais que podem não estar no PNCP)
        3. Query TCU /termos-contratuais para contratos do TCU (sem auth)
        4. [DESATIVADO] ComprasGov v3 — fora do ar desde 2026-03-02
        5. DEDUP cross-source: aplicar Tier 1 + Tier 2 (ver dedup_strategy)
        6. Agregar por cnpjFornecedor: contar vitórias (TOTAL cross-source), somar valores, listar órgãos
        7. Identificar empresas com ≥3 contratos homologados (somando todas as fontes)
        8. Filtrar empresas com padrão consistente (não apenas 1 contrato grande)
        9. Manter campo `fontes` por registro (e.g., ["PNCP", "Portal Transparência", "TCU"])
        Output: Lista de CNPJs candidatos com métricas de participação e cobertura multi-fonte

    - phase: 2_enrichment
      name: "Investigação CSI do Lead"
      agents: [data-engineer, analyst]
      dependencies: [1_discovery]
      deliverable: |
        Para cada CNPJ candidato:
        1. CHECK SANÇÕES PRIMEIRO (Portal da Transparência — 1 call, mais confiável):
           curl -s -H "chave-api-dados: $PT_KEY" \
             "https://api.portaldatransparencia.gov.br/api-de-dados/pessoa-juridica?cnpj={CNPJ}"
           → Se sancionadoCEIS=true OU sancionadoCNEP=true OU sancionadoCEPIM=true → DESCARTAR
           → BÔNUS: possuiContratacao e participanteLicitacao indicam presença federal
        2. Verificar sócios contra lista TCU inabilitados (sem auth):
           curl -s "https://contas.tcu.gov.br/ords/condenacao/consulta/inabilitados/{CPF}"
           Se sancionado → DESCARTAR IMEDIATAMENTE (não gastar tempo)
        3. Query OpenCNPJ → razão social, CNAE, porte, capital social, QSA, contato
        4. Query Portal da Transparência /contratos/cpf-cnpj → perfil federal completo:
           objetos contratados, valores, órgãos, datas, contatoResponsavel
           (COMPLEMENTAR ao PNCP — pode ter contratos federais não publicados no PNCP)
        5. Verificar se porte justifica compra do relatório (no-brainer test)
        6. Analisar padrão de vitórias: setores, valores médios, órgãos frequentes
           (agregar dados cross-source: PNCP + Portal Transparência + TCU)
        7. Identificar sócios/decisores via QSA (nome + qualificação)
        8. Descartar se: situação != ATIVA, capital_social < R$50.000, sem contato

        Critério no-brainer: valor total de oportunidades abertas encontradas
        deve ser ≥10x o preço do relatório. Se empresa vence licitações de
        R$200K+ e o relatório custa R$1.500, é no-brainer (133x).

    - phase: 3_matching
      name: "Cruzamento Multi-Fonte Editais Abertos × Perfil do Lead"
      agents: [data-engineer, analyst]
      dependencies: [2_enrichment]
      deliverable: |
        Para cada lead qualificado:
        1. Determinar setores/keywords relevantes (do CNAE + histórico de vitórias)
        2. Query PNCP publicações abertas (últimos 10 dias) com filtros de setor/UF
        3. [DESATIVADO] ComprasGov v3 — fora do ar
        4. Query Portal da Transparência /licitacoes por órgãos frequentes do lead
           (requer codigoOrgao + período max 1 mês — usar órgãos do histórico de contratos)
        5. DEDUP cross-source: aplicar Tier 1 + Tier 2 antes de filtrar
        6. Filtrar editais dedupados que matcham o perfil do lead:
           - Mesmo setor/CNAE
           - UF compatível (mesma UF ou UFs onde já venceu)
           - Faixa de valor compatível (dentro do range histórico do lead)
           - Modalidade compatível
           - Prazo de proposta ainda aberto (dataAberturaProposta > hoje)
           DESCARTAR editais com prazo expirado — não têm valor para o lead.
        7. Ranquear editais por relevância (maior match com perfil = mais relevante)
           Incluir dias restantes para proposta como fator de ranqueamento:
           - Prazo curto (≤5 dias): urgente — impressiona, mas avaliar se lead consegue reagir
           - Prazo médio (6-15 dias): ideal — tempo hábil para preparar proposta
           - Prazo longo (>15 dias): confortável — menor urgência
        8. Construir link oficial para cada edital:
           - PNCP: https://pncp.gov.br/app/editais/{CNPJ}/{ANO}/{SEQ}
           - ComprasGov: link direto se disponível nos dados da API
           - Portal Transparência: link do portal se disponível
           Priorizar link PNCP quando edital existe em múltiplas fontes.
        9. Contar total N de oportunidades ÚNICAS encontradas (pós-dedup)

        Se N = 0 para um lead: descartar (não há valor a entregar).
        Se N < 3: avaliar se vale incluir (pode ser email mais curto).

    - phase: 4_qualification
      name: "Qualificação Final e Decisões do @analyst"
      agents: [analyst]
      dependencies: [3_matching]
      deliverable: |
        Para cada lead com oportunidades encontradas, o @analyst decide:

        A) FRAÇÃO GRÁTIS (quantas licitações mostrar no email):
           Diretriz RELÂMPAGO v5.0 (mais generosa — impressionar no E1):
           | Total (N) | Mostrar grátis (K) | Ratio  |
           |:---------:|:------------------:|:------:|
           | 1-5       | 2                  | ~40%   |
           | 6-15      | 3                  | ~25%   |
           | 16-30     | 4                  | ~15%   |
           | 31+       | 4-5                | ~12%   |

           Fatores que influenciam:
           - Valor agregado (alto valor = menos amostra)
           - Perfil do lead (lead grande merece amostra mais impressionante)
           - Qualidade das amostras (escolher as mais impactantes)

        B) QUAIS licitações mostrar (a melhor amostra):
           Critérios para seleção da amostra:
           - Maior match com histórico de vitórias do lead
           - Maior valor estimado (impressiona mais)
           - Prazo razoável (não muito próximo do vencimento)
           - Diversidade de órgãos (mostra amplitude da cobertura)

        C) PREÇO (TRIPWIRE UNIVERSAL v5.0):
           Preço fixo: R$297 para TODOS os leads (não varia por porte)
           Inclui: relatório completo + 7 dias SmartLic Pro
           Ancoragem: "R$297 para R${valor_total} em oportunidades"
           Upsell após 7 dias: SmartLic Pro R$1.999/mês

        D) ANÁLISE DE RELEVÂNCIA para cada licitação de amostra:
           Para cada oportunidade mostrada no email, redigir justificativa:
           - Por que esta licitação é relevante PARA ESTE LEAD ESPECÍFICO
           - Cruzar com vitórias passadas (mesmo tipo de objeto/órgão/valor)
           - Indicar modalidade, valor estimado, UF
           - OBRIGATÓRIO: prazo de apresentação de proposta (data DD/MM/AAAA + dias restantes)
           - Indicar nível de concorrência esperado (se dados disponíveis)
           - Se prazo ≤5 dias: alertar urgência explicitamente no email

    - phase: 5_email_and_save
      name: "Redação da Cadência 4-Touch + Relatório Individual + Salvamento"
      agents: [po, analyst, dev]
      dependencies: [4_qualification]
      deliverable: |
        PARTE A — CADÊNCIA DE EMAILS (para cada lead):
        1. Gerar TODOS os 4 emails + nota LinkedIn da cadência (ver email_sequence)
        2. Email 1: soft CTA, amostras com análise, SEM preço, hook temporal
        3. Email 2: prova social, primeira menção ao preço, reply-thread
        4. LinkedIn: nota de conexão ≤300 chars referenciando email
        5. Email 3: urgência com prazos reais, CTA direto
        6. Email 4: breakup respeitoso, porta aberta
        7. Subject lines curtos (3-6 palavras), 2 variantes A/B para Email 1
        8. LGPD footer + tracking code em TODOS os emails
        9. Tom alinhado com landing page (inteligência de decisão, filtro estratégico)
        10. Registrar lead no tracking sheet (docs/ataque-turbo-tracking.md)

        PARTE B — RELATÓRIO INDIVIDUAL (para cada lead):
        7. Gerar .md com TODAS as {N} oportunidades (não apenas a amostra K)
        8. Cada oportunidade com análise de relevância + viabilidade 4 fatores
        9. Cada oportunidade com prazo de proposta (data + dias restantes)
        10. Tom analítico/objetivo (sem CTA, sem preço — é o produto já pago)
        11. Seguir template lead_report_structure (ver output_rules)
        12. Salvar em docs/ataque-turbo-{NNN}-relatorios/{slug-empresa}.md

        PARTE C — SALVAMENTO AUTOMÁTICO (OBRIGATÓRIO — sem pedir confirmação):
        13. Determinar próximo número sequencial (ler docs/ataque-turbo-*.md existentes)
        14. Criar diretório docs/ataque-turbo-{NNN}-relatorios/
        15. Salvar relatório consolidado: docs/ataque-turbo-{NNN}.md
        16. Salvar relatório individual de CADA lead: docs/ataque-turbo-{NNN}-relatorios/{slug}.md
        17. Confirmar salvamento com lista de paths no output final
        O usuário NUNCA deve precisar pedir para salvar. É automático.

# ═══════════════════════════════════════════════════════════════════
# COPY E TOM DE VOZ (ALINHADO COM LANDING PAGE)
# ═══════════════════════════════════════════════════════════════════

copy_guidelines:
  positioning: "Inteligência de decisão para licitações públicas"
  algorithm_description: |
    O SmartLic consolida fontes oficiais, classifica por relevância setorial
    e avalia viabilidade com critérios objetivos — modalidade, prazo, valor
    e compatibilidade geográfica.

  preferred_phrases:
    - "Filtro estratégico de oportunidades"
    - "Avaliação objetiva de viabilidade"
    - "Vale a pena ou não, e por quê"
    - "Chance real de retorno"
    - "Elimina o que não faz sentido para o seu perfil"
    - "Critérios de viabilidade"
    - "Foco no que paga"
    - "Fontes oficiais verificadas"

  BANNED_phrases:
    - 'PNCP (dizer "fontes oficiais" em vez disso)'
    - 'Descobrir / Explorar (muito fraco para o valor entregue)'
    - 'Plano / Assinatura / Pacote / Busca'
    - 'Inteligência automatizada / Inovador'
    - '95% de precisão ou qualquer métrica de velocidade/acurácia'
    - 'Agregador de dados'
    - 'IA generativa (dizer "algoritmo de classificação" em vez disso)'
    - 'Assine / Teste grátis / Trial'

  language_rules:
    - "Acentuação correta obrigatória em todo texto PT-BR"
    - "Usar cedilha (ç), til (ã, õ), agudo (á, é, í, ó, ú), circunflexo (â, ê, ô)"
    - "Revisar cada email antes de finalizar"
    - "Números: R$ com ponto para milhares (R$ 1.500, R$ 200.000)"

# ═══════════════════════════════════════════════════════════════════
# INFRAESTRUTURA DE DELIVERABILITY (CRÍTICO — sem isso, emails vão pra spam)
# ═══════════════════════════════════════════════════════════════════

deliverability:
  domain: "outreach.confenge.com.br"
  description: |
    Domínio DEDICADO para cold outreach — NUNCA usar confenge.com.br ou
    smartlic.tech diretamente. Se domínio principal for marcado como spam,
    prejudica todo o negócio.

  authentication:
    spf: "v=spf1 include:_spf.google.com ~all"
    dkim: "Configurar via Google Workspace ou provedor"
    dmarc: "v=DMARC1; p=reject; rua=mailto:dmarc@confenge.com.br"
    notes: |
      DMARC p=reject é o padrão 2026. Google e Microsoft REJEITAM
      ativamente emails sem SPF+DKIM+DMARC desde Nov/2025.

  warmup:
    duration_days: 14-21
    initial_volume: "5-10 emails/dia (para contatos conhecidos)"
    ramp_up: "Aumentar 5/dia a cada 3 dias"
    max_volume: "20 emails/inbox/dia (sweet spot 2026)"
    absolute_max: "35-50 emails/inbox/dia (risco elevado)"
    inboxes_per_domain: 3-5
    notes: |
      NUNCA iniciar cold outreach sem warmup completo.
      Enviar para contatos conhecidos (fornecedores, parceiros) durante
      o período de warmup. Incluir respostas reais (não só envio).

  sending_rules:
    max_per_inbox_per_day: 20
    best_days: ["Terça", "Quarta", "Quinta"]
    best_hours: "08:00-10:00 BRT (horário do lead)"
    worst_days: ["Segunda (backlog)", "Sexta (desengajamento)"]
    notes: |
      Quinta-feira tem o maior reply rate (6.87% vs média).
      8-11 PM também performa bem (executivos leem após expediente).

# ═══════════════════════════════════════════════════════════════════
# CADÊNCIA MULTI-TOUCH (4 EMAILS + LINKEDIN EM 14 DIAS)
# ═══════════════════════════════════════════════════════════════════

cadence:
  name: "Cadência RELÂMPAGO — 4-Touch em 5 Dias"
  description: |
    Sequência COMPRIMIDA de 4 pontos de contato em 5 dias. Preço tripwire
    R$297 direto no Email 1. LinkedIn ANTES do email (cria reconhecimento).
    Se não converteu em 5 dias, mover para nurturing mensal.

    Mudança fundamental vs v4.0:
    - 14 dias → 5 dias (momentum do sinal temporal — editais expiram)
    - Soft CTA → Tripwire R$297 direto (abaixo do threshold de decisão)
    - LinkedIn D+5 → LinkedIn D-1 (pré-aquecimento antes do email)
    - Amostra 10-20% → 30-40% (mais generosa para impressionar)
    - Email 250 palavras → 80 palavras max (12% reply rate benchmark)

    Benchmarks 2026:
    - Multi-channel (email+LinkedIn) = 11.2% reply vs 3.1% email-only
    - Emails 50-75 palavras = 12% reply rate (vs 6% para >150 palavras)
    - Subject 21-40 chars = 49.1% open rate (vs <30% para >60 chars)
    - Tripwire buyers: 60-70% repeat purchase rate

  pricing:
    tripwire:
      price: 297
      currency: "BRL"
      payment: "PIX (liquidação instantânea)"
      includes: "Relatório completo + 7 dias SmartLic Pro"
      delivery_time: "< 30 minutos após pagamento"
      psychology: "Abaixo do threshold de decisão individual — não precisa de aprovação de diretoria"
    upsell:
      price: 1999
      trigger: "Após 7 dias de acesso Pro"
      message: "Quer continuar recebendo automaticamente? R$1.999/mês."
    premium_fallback:
      price: 1500
      trigger: "Lead responde mas recusa tripwire"
      description: "Relatório premium mensal curado"

  sequence:
    - touch: 0
      channel: linkedin
      day: "D-1"
      name: "Pré-aquecimento LinkedIn"
      objective: "Criar reconhecimento antes do email. Visita ao perfil + conexão."
      cta_type: "connection_request"
      max_chars: 150  # Nota curta
      template: |
        {Nome}, trabalho com inteligência em licitações.
        Vi o perfil da {Empresa}. Aceita a conexão?
      notes: "Enviar ANTES do email. Cria familiaridade subconsciente."

    - touch: 1
      channel: email
      day: "D+0"
      name: "Tripwire — Valor + Preço R$297"
      objective: "Entregar valor massivo (amostra 30-40%) + oferta tripwire irresistível."
      cta_type: "direct_tripwire"
      cta_example: "Envio a lista completa com análise de viabilidade por R$297 via PIX. Inclui 7 dias de acesso à plataforma."
      subject_strategy: "Curto (4-5 palavras): '{N} editais para a {Empresa}'"
      includes_price: true  # SIM — R$297 é tripwire, não premium
      includes_sample: true  # 3-4 editais em formato compacto (1 linha cada)
      max_words: 80
      signature: short

    - touch: 2
      channel: email
      day: "D+2"
      name: "Urgência Real — Reply Thread"
      objective: "Criar urgência com prazos reais expirando. Reply-thread do E1."
      cta_type: "urgency_ask"
      cta_example: "Mando a lista completa com os prazos?"
      subject_strategy: "'re: {subject do Email 1}' (reply-thread)"
      includes_price: false
      max_words: 50
      signature: short

    - touch: 3
      channel: linkedin_dm
      day: "D+3"
      name: "LinkedIn DM (se aceitou conexão)"
      objective: "Referência ao email. Canal alternativo."
      max_chars: 100
      template: |
        {Nome}, enviei um email com {N} editais de {setor}
        compatíveis com o perfil da {Empresa}. {X} têm prazo
        esta semana. Viu?
      notes: "Só enviar se aceitou conexão D-1. Se não aceitou, enviar novo pedido."

    - touch: 4
      channel: email
      day: "D+5"
      name: "Breakup + Oferta Final"
      objective: "Encerrar. Loss aversion: mencionar editais que já venceram desde E1."
      cta_type: "breakup_with_loss"
      cta_example: "Se fizer sentido em outro momento, me responda. Mantenho o perfil de vocês no radar."
      subject_strategy: "'última vez, {nome}'"
      includes_price: false
      max_words: 60
      signature: short
      notes: |
        Mencionar quantos editais VENCERAM desde o E1. Ativa loss aversion.
        Breakup emails têm 3-5% reply rate. Tom respeitoso, porta aberta.

  urgency_threshold_days: 7  # Editais com ≤7 dias recebem destaque
  urgency_rules: |
    - Email 1: incluir editais urgentes na amostra
    - Email 2 (D+2): foco exclusivo em prazos expirando esta semana
    - Email 4 (breakup): mencionar editais que JÁ VENCERAM desde E1

# ═══════════════════════════════════════════════════════════════════
# SUBJECT LINE STRATEGY (CURTO = MELHOR)
# ═══════════════════════════════════════════════════════════════════

subject_line_strategy:
  max_words: 6
  max_chars: 40
  tone: "lowercase, casual — como colega, não vendedor"
  ab_testing: true  # Gerar 2 variantes por lead, alternar

  rules:
    - "1-8 palavras (1-2 é o ideal segundo dados Gong 2026)"
    - "NUNCA usar '?' no subject (reduz open rate em 56%)"
    - "NUNCA ALL CAPS, emojis, ou '!!!' (red flags de spam)"
    - "Incluir nome da empresa (personalização obrigatória)"
    - "Números aumentam especificidade: '10 licitações' > 'oportunidades'"
    - "Evitar trigger words: 'grátis', 'urgente', 'limitado', 'oferta'"

  templates:
    email_1_variant_a: "{N} licitações para a {Empresa}"
    email_1_variant_b: "{empresa} — oportunidades até {mês}"
    email_2: "re: {subject do Email 1}"
    email_3: "prazo {DD/MM} — {empresa}"
    email_4: "encerro por aqui, {nome}"

  banned_subjects:
    - "{Empresa} — identificamos {N} oportunidades de licitação no perfil de vocês"  # Antigo, muito longo
    - "Oportunidade imperdível"
    - "Não perca"
    - "Exclusivo para você"

# ═══════════════════════════════════════════════════════════════════
# CTA PROGRESSION (SOFT → HARD → BREAKUP)
# ═══════════════════════════════════════════════════════════════════

cta_progression:
  description: |
    Modo RELÂMPAGO: preço tripwire R$297 direto no E1.
    R$297 está abaixo do threshold de decisão individual — não precisa
    de aquecimento progressivo como R$1.500-3.000. Single CTA por email.

  rules:
    - "UM único CTA por email (nunca múltiplos pedidos)"
    - "Email 1: preço R$297 DIRETO — tripwire não precisa de warm-up"
    - "Email 2: sem preço, foco em urgência e prazos reais"
    - "Email 3 (LinkedIn DM): referência ao email, sem preço"
    - "Email 4 (breakup): sem preço, loss aversion com editais vencidos"
    - "Ancoragem sempre presente: 'R$297 para R${valor_total} em oportunidades'"

  progression:
    email_1: "Envio a lista completa com análise de viabilidade por R$297 via PIX. Inclui 7 dias de acesso à plataforma."
    email_2: "{X} daqueles editais têm prazo nos próximos 7 dias. Mando a lista completa com os prazos?"
    linkedin_dm: "{Nome}, enviei um email com {N} editais. {X} têm prazo esta semana. Viu?"
    email_4: "Se fizer sentido em outro momento, me responda. Mantenho o perfil de vocês no radar."

# ═══════════════════════════════════════════════════════════════════
# LGPD COMPLIANCE
# ═══════════════════════════════════════════════════════════════════

lgpd_compliance:
  legal_basis: "Legítimo interesse (Art. 10, LGPD)"
  justification: |
    Dados obtidos de portais públicos de contratações governamentais
    (PNCP — obrigatório por Lei 14.133/2021, Art. 174). Empresas que
    participam de licitações publicam voluntariamente seus dados em
    bases governamentais. O contato tem finalidade específica (informar
    sobre oportunidades compatíveis com perfil de atuação da empresa).
    Base jurídica significativamente mais forte que dados scrapeados
    de LinkedIn ou listas compradas.

  required_in_every_email:
    footer: |
      Ref: {TRACKING_CODE}
      Dados de contratações públicas (PNCP, Lei 14.133/2021).
      Descadastrar: responda "remover".
    notes: |
      Footer OBRIGATÓRIO em TODOS os 4 emails da cadência.
      Se lead responder "remover": PARAR IMEDIATAMENTE toda cadência.
      Manter registro de opt-outs em docs/ataque-turbo-tracking.md.

  data_sources_documentation: |
    Manter em docs/lgpd-lia-outreach.md um Legitimate Interest Assessment:
    1. Fonte dos dados: PNCP, TCU, OpenCNPJ (portais públicos)
    2. Finalidade: informar empresa sobre oportunidades de licitação
    3. Necessidade: dados mínimos (CNPJ, razão social, CNAE, contato)
    4. Balanceamento: interesse da empresa (oportunidades) > risco de privacidade
    5. Salvaguardas: opt-out fácil, dados não compartilhados com terceiros

# ═══════════════════════════════════════════════════════════════════
# TRACKING E CRM MÍNIMO
# ═══════════════════════════════════════════════════════════════════

tracking:
  code_format: "AT-{NNN}-{SLUG}"  # Ex: AT-001-PEN (Pentágono), AT-001-SOL (Solovia)
  description: |
    Código único por lead incluído no rodapé de cada email.
    Permite rastrear respostas e atribuir conversões.

  crm_file: "docs/ataque-turbo-tracking.md"
  crm_structure: |
    # Ataque Turbo — Tracking de Leads

    | Run | Lead | CNPJ | Tracking | Email 1 | Email 2 | LinkedIn | Email 3 | Email 4 | Resposta | Conversão | Valor | Notas |
    |-----|------|------|----------|---------|---------|----------|---------|---------|----------|-----------|-------|-------|
    | 001 | Pentágono | 47.026.679/0001-51 | AT-001-PEN | DD/MM | DD/MM | DD/MM | DD/MM | DD/MM | — | — | — | — |

  status_values:
    - "pendente"      # Ainda não enviado
    - "email_1"       # Email 1 enviado
    - "email_2"       # Email 2 enviado
    - "linkedin"      # Conexão LinkedIn enviada
    - "email_3"       # Email 3 enviado
    - "email_4"       # Email 4 (breakup) enviado
    - "respondeu"     # Lead respondeu (qualquer email)
    - "converteu"     # Lead pagou relatório
    - "removido"      # Lead pediu opt-out
    - "descartado"    # Lead eliminado (sem editais, sancionado, etc.)

  ab_testing: |
    Registrar variante de subject usada por lead:
    | Lead | Subject Variante | Open (Y/N) | Reply (Y/N) |
    Após 20+ leads, analisar qual variante performa melhor.

# ═══════════════════════════════════════════════════════════════════
# DECISION-MAKER TARGETING (ALÉM DO QSA)
# ═══════════════════════════════════════════════════════════════════

decision_maker_targeting:
  description: |
    QSA (Receita Federal) lista sócios LEGAIS — que podem ser investidores
    passivos, não decisores operacionais. Buscar o decisor REAL antes de enviar.

  priority_order:
    - step: 1
      source: "LinkedIn da empresa"
      target: "Diretor Comercial, Gerente de Licitações, Engenheiro Responsável"
      time: "5-10 min/lead"
      notes: "Buscar no LinkedIn pelo nome da empresa + cargo"
    - step: 2
      source: "Site da empresa"
      target: "Página 'Equipe', 'Sobre', ou 'Contato' com nomes"
      time: "2-5 min/lead"
    - step: 3
      source: "QSA (OpenCNPJ)"
      target: "Sócio-Administrador (qualificação 49) ou Diretor (qualificação 05)"
      time: "0 min (já coletado na Phase 2)"
      notes: "FALLBACK — usar apenas se steps 1-2 falharem"

  personalization_rule: |
    Se decisor identificado via LinkedIn/site: usar nome + cargo no email.
    Se apenas QSA disponível: usar nome do sócio-administrador.
    Se nenhum nome: usar "Prezado(a) responsável pela área de licitações".
    NUNCA usar "Prezado(a) Sr(a)" genérico — perda de personalização.

# ═══════════════════════════════════════════════════════════════════
# TEMPLATE DE EMAIL (SEQUÊNCIA DE 4 TOQUES)
# ═══════════════════════════════════════════════════════════════════

email_sequence:
  description: |
    Sequência de 4 emails + 1 LinkedIn. Cada template abaixo é ADAPTADO
    pelo @po caso a caso, SEMPRE com acentuação PT-BR. Os templates são
    referência — personalizar com dados reais de cada lead.

  # ─────────────────────────────────────────────────────
  # EMAIL 1 — TRIPWIRE R$297 (D+0) — MAX 80 PALAVRAS
  # ─────────────────────────────────────────────────────
  email_1_tripwire: |
    Assunto: {N} editais para a {Empresa}

    {Nome},

    A {Empresa} venceu {tipo_contrato} para {orgao_principal} recentemente.

    Rodei nosso algoritmo contra o perfil de vocês e encontrei {N} editais
    abertos com prazo hábil — R${valor_total} em oportunidades.

    {K} deles:

    1. {Objeto} — {Órgão}, {UF} — R${valor} — prazo {DD/MM}
    2. {Objeto} — {Órgão}, {UF} — R${valor} — prazo {DD/MM}
    3. {Objeto} — {Órgão}, {UF} — R${valor} — prazo {DD/MM}

    Envio a lista completa com análise de viabilidade por R$297 via PIX.
    Inclui 7 dias de acesso à plataforma de monitoramento.

    Tiago
    smartlic.tech

    Ref: {TRACKING_CODE}
    Dados de contratações públicas (PNCP, Lei 14.133/2021).
    Descadastrar: responda "remover".

    REGRAS DO EMAIL 1 (RELÂMPAGO):
    - MAX 80 palavras no corpo (benchmark: 50-75 = 12% reply)
    - Preço R$297 DIRETO (tripwire, não premium)
    - 3-4 amostras em formato COMPACTO (1 linha cada, não blocos de 5 linhas)
    - Sem auto-apresentação ("engenheiro de software", "criador do SmartLic")
    - Sem parágrafo sobre o algoritmo (ninguém se importa)
    - Hook: contrato recente + editais agora
    - SEM "Olá" ou "Abraço" (direto ao ponto)

  # ─────────────────────────────────────────────────────
  # EMAIL 2 — URGÊNCIA REAL (D+2) — REPLY THREAD, MAX 50 PALAVRAS
  # ─────────────────────────────────────────────────────
  email_2_urgency: |
    Assunto: re: {subject do Email 1}

    {Nome},

    {X} daqueles editais têm prazo nos próximos 7 dias.

    Se a {Empresa} quiser avaliar, precisa ser esta semana.

    Mando a lista completa com os prazos?

    Tiago

    Ref: {TRACKING_CODE}
    Descadastrar: responda "remover".

    REGRAS DO EMAIL 2:
    - REPLY THREAD do E1 (mesmo subject com "re:")
    - MAX 50 palavras
    - Sem preço (já foi no E1)
    - Foco exclusivo em PRAZOS expirando
    - Sem prova social ou filler

  # ─────────────────────────────────────────────────────
  # LINKEDIN D-1 — CONEXÃO PRÉ-EMAIL (CURTA)
  # ─────────────────────────────────────────────────────
  linkedin_connection: |
    {Nome}, trabalho com inteligência em licitações.
    Vi o perfil da {Empresa}. Aceita a conexão?

    REGRAS:
    - Máximo 150 caracteres (mais curto = maior aceitação)
    - Enviar ANTES do Email 1 (D-1)
    - NUNCA mencionar preço ou produto
    - Criar reconhecimento, não vender

  # ─────────────────────────────────────────────────────
  # LINKEDIN DM (D+3) — REFERÊNCIA AO EMAIL
  # ─────────────────────────────────────────────────────
  linkedin_dm: |
    {Nome}, enviei um email com {N} editais de {setor} compatíveis
    com o perfil da {Empresa}. {X} têm prazo esta semana. Viu?

    REGRAS:
    - Máximo 100 caracteres
    - Só enviar se aceitou conexão D-1
    - Sem preço, sem pitch
    - Se NÃO aceitou conexão, enviar novo pedido de conexão

  # ─────────────────────────────────────────────────────
  # EMAIL 3 — BREAKUP + LOSS AVERSION (D+5) — MAX 60 PALAVRAS
  # ─────────────────────────────────────────────────────
  email_3_breakup: |
    Assunto: última vez, {nome}

    {Nome},

    Encontrei {N} oportunidades para a {Empresa}, totalizando
    R${valor_total}. {Y} já venceram o prazo desde meu primeiro email.

    Se fizer sentido em outro momento, me responda. Mantenho o
    perfil de vocês no radar.

    Tiago
    smartlic.tech

    Ref: {TRACKING_CODE}
    Descadastrar: responda "remover".

    REGRAS DO EMAIL 3 (BREAKUP):
    - MAX 60 palavras
    - Mencionar editais que JÁ VENCERAM desde E1 (loss aversion)
    - Tom respeitoso, porta aberta
    - Sem preço, sem pressão
    - Breakup emails têm 3-5% reply rate (psicologia de perda)

  # ─────────────────────────────────────────────────────
  # REGRAS GLOBAIS DA SEQUÊNCIA
  # ─────────────────────────────────────────────────────
  sequence_rules:
    - "Acentuação correta OBRIGATÓRIA (á, é, í, ó, ú, ã, õ, ç, â, ê, ô)"
    - "Cada licitação DEVE ter link oficial do edital"
    - "Cada licitação DEVE ter prazo (data + dias restantes)"
    - "Análise de relevância DEVE ser personalizada (não genérica)"
    - "NUNCA incluir editais com prazo já expirado"
    - "NUNCA mencionar 'assinatura', 'plano', 'trial'"
    - "NUNCA fabricar dados — usar apenas dados reais das APIs"
    - "LGPD footer obrigatório em TODOS os 4 emails"
    - "Tracking code obrigatório em TODOS os emails"
    - "Email 1: SEM PREÇO. Preço apenas a partir do Email 2"
    - "Linguagem de amostra: 'Separei as {K} com maior match' (NÃO 'Aqui estão {K} delas')"
    - "Tom: profissional, direto, focado em valor financeiro"
    - "Se lead responder 'remover': PARAR TODA a cadência imediatamente"
    - "Se lead responder positivamente em qualquer email: sair da cadência automática"

