bundle:
  name: Ataque Turbo RELÂMPAGO — Receita Instantânea com Licitações Reais
  icon: "\U0001F4A5"
  version: "5.0"
  description: |
    Squad de prospecção ativa MODO RELÂMPAGO — projetado para máxima
    conversão instantânea e geração de caixa imediato. Cruza dados reais
    de MÚLTIPLAS fontes públicas (PNCP, Portal da Transparência, TCU,
    OpenCNPJ) com perfis de empresas vencedoras para gerar cadências
    comprimidas com oferta tripwire irresistível.

    ESTRATÉGIA TRIPWIRE: Oferta de entrada R$297 via PIX (diagnóstico de
    oportunidades + 7 dias SmartLic Pro). Converte em 48-72h. Upsell
    natural para assinatura R$1.999/mês após os 7 dias de acesso.

    CADÊNCIA COMPRIMIDA 5 DIAS: LinkedIn D-1 (conexão) → Email D+0
    (tripwire R$297 com amostra generosa) → Email D+2 (urgência prazos)
    → LinkedIn DM D+3 → Email D+5 (breakup + oferta final). Preço
    direto no E1 — R$297 é abaixo do threshold de decisão individual.

    VOLUME QUALIFICADO > PERFECCIONISMO: 12-15 leads por run com
    investigação rápida (20-30 min/lead), não 3-4 leads com CSI de horas.
    Estatisticamente, 5-6% reply rate exige volume para gerar conversões.

    INFRAESTRUTURA DE DELIVERABILITY: Até warmup completo do domínio
    outreach.confenge.com.br, enviar de tiago.sasaki@confenge.com.br
    (max 5 cold/dia). Warmup paralelo: 5-10 emails/dia para conhecidos.

    COMPLIANCE LGPD: Dados de portais públicos de contratações (PNCP,
    Lei 14.133/2021) = base jurídica forte (legítimo interesse, Art. 10).
    Todo email DEVE incluir opt-out ("responda remover") e fonte dos dados.

agents:
  - analyst        # Lead: qualificação de leads, decisão de fração grátis, pricing, investigação de perfil
  - data-engineer  # PNCP + Receita Federal API queries, agregação, cruzamento de dados
  - dev            # Executar curl commands, processar dados, gerar arquivos de saída
  - po             # Personalização de emails, proposta de valor, CTA, alinhamento com copy do site

workflows:
  - acha-leads (Lean mode, sem OpenAI API)

tasks:
  - acha-leads.md

references:
  - docs/sessions/2026-02/turbocash.md                # Playbook de monetização + pipeline de leads
  - .aios-core/development/tasks/acha-leads.md         # Workflow de prospecção buy-intent
  - frontend/app/page.tsx                              # Landing page — tom e copy de referência
  - frontend/lib/value-propositions.ts                 # Biblioteca de proposições de valor
  - backend/search_pipeline.py                         # _build_pncp_link() para links de editais
  - backend/sectors_data.yaml                          # 15 setores com keywords

