# ═══════════════════════════════════════════════════════════════════
# CONSTRAINTS E QUALITY GATES
# ═══════════════════════════════════════════════════════════════════

auto_save:
  enabled: true
  description: |
    TODOS os arquivos DEVEM ser salvos automaticamente ao final da execução.
    O usuário NUNCA deve precisar pedir para salvar.
    Arquivos a gerar:
    1. docs/ataque-turbo-NNN.md (consolidado — emails + métricas)
    2. docs/ataque-turbo-NNN-relatorios/{slug}.md (um por lead — relatório completo)
    Criar diretório de relatórios com Bash mkdir -p.
    Usar Write tool para cada arquivo.
    Confirmar salvamento com lista completa de paths no output final.

constraints:
  # ── Constraints RELÂMPAGO v5.0 ──
  - "SALVAR AUTOMATICAMENTE ao final — nunca esperar pedido do usuário"
  - "Zero chamadas OpenAI API — emails redigidos manualmente pelo squad"
  - "Dados exclusivamente reais de APIs públicas — NUNCA fabricar"
  - "Acentuação correta em todo texto PT-BR"
  - "Cada oportunidade DEVE incluir link oficial do edital"
  - "Leads inéditos a cada execução (dedup contra runs anteriores)"
  - "DEDUP cross-source OBRIGATÓRIO antes de contar oportunidades"
  - "tamanhoPagina: 50 para PNCP /contratacoes, 500 para PNCP /contratos"
  - "Identidade: Tiago, smartlic.tech (SEM título técnico, SEM 'criador do')"
  - "TRIPWIRE R$297: preço no E1. Inclui 7 dias SmartLic Pro."
  - "EMAIL 1 MAX 80 PALAVRAS. EMAIL 2 MAX 50. EMAIL 3 MAX 60."
  - "AMOSTRAS COMPACTAS: 1 linha por edital (Objeto — Órgão, UF — R$valor — prazo DD/MM)"
  - "CADÊNCIA 5 DIAS: LinkedIn D-1 → E1 D+0 → E2 D+2 → LinkedIn DM D+3 → E3 D+5"
  - "SUBJECT CURTO: ≤5 palavras, ≤40 chars"
  - "LGPD FOOTER em TODOS os emails"
  - "TRACKING CODE em TODOS os emails: formato AT-{NNN}-{SLUG}"
  - "OPT-OUT IMEDIATO: se lead responder 'remover', parar TODA cadência"
  - "TRACKING SHEET: registrar cada lead em docs/ataque-turbo-tracking.md"
  - "RELATÓRIO GERADO APÓS PAGAMENTO (just-in-time, não antes)"
  - "12-15 LEADS POR RUN (não 3-4). 20-30 min/lead (não 2-4 horas)"
