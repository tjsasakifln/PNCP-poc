bundle:
  name: Squad Technical Debt V2
  icon: 🔧
  description: |
    Squad especializado para resolucao do EPIC-DEBT-V2 (45 debitos tecnicos, ~199h).
    Execucao paralela em 4 tracks independentes com qualidade suprema e zero regressoes.

  epic: EPIC-DEBT-V2
  source: docs/stories/epic-technical-debt-v2.md
  assessment: docs/prd/technical-debt-assessment.md
  created: 2026-03-30
  baselines:
    backend_tests: 7656
    frontend_tests: 5733

agents:
  - architect      # Guarda de estrutura — review de decomposicao de monolitos, decisoes de pacote
  - dev            # Implementacao principal — backend + frontend
  - data-engineer  # DB migrations, rollback scripts, performance
  - ux-design-expert  # A11y audit, RSC islands, frontend polish
  - qa             # Gate de qualidade — testes por story, full suite no final
  - devops         # EXCLUSIVO git push / PR creation apos cada story Done

workflows:
  - brownfield-service.yaml
  - brownfield-fullstack.yaml
  - bidiq-feature-e2e.yaml

tasks:
  - dev-develop-story.md
  - qa-gate.md
  - qa-run-tests.md
  - db-apply-migration.md
  - db-schema-audit.md
  - architect-analyze-impact.md

# ============================================================
# TRACKS DE EXECUCAO PARALELA
# ============================================================

tracks:
  track_a_backend_critical:
    name: "Track A — Backend Critico"
    agents: [architect, dev]
    stories:
      - id: DEBT-201
        title: "Decomposicao filter/core.py (P0, 22h)"
        priority: P0
        note: "Facade pattern obrigatorio. 283 testes devem passar sem mudanca de import."
      - id: DEBT-208
        title: "Backend Schema + Migrations Cleanup (P2-P3, 6h)"
        priority: P2-P3
        note: "Paralelo ao Track C no backlog"

  track_b_frontend:
    name: "Track B — Frontend"
    agents: [ux-design-expert, dev]
    stories:
      - id: DEBT-202
        title: "Frontend Estrutural — Landing RSC + useSearchOrchestration (P0-P1, 26h)"
        priority: P0-P1
        note: "useSearchOrchestration 618 LOC. Snapshot tests de props obrigatorios."
      - id: DEBT-205
        title: "Acessibilidade Avancada + Feature Flag Governance (P2, 28h)"
        priority: P2
        depends_on: [DEBT-202]
        note: "Entra apos DEBT-202 Done"
      - id: DEBT-209
        title: "Frontend Polish e Design System (P3, 17h)"
        priority: P3
        note: "Backlog oportunistico"

  track_c_database:
    name: "Track C — Database"
    agents: [data-engineer]
    stories:
      - id: DEBT-200
        title: "Quick Wins Sprint 1 — DB + A11y + Backend (P2-P3, 14h)"
        priority: P2-P3
        note: "PRIMEIRO de tudo. Abre caminho para DEBT-203."
      - id: DEBT-203
        title: "Resiliencia — Cache Decomposition + DB Rollback Scripts (P1, 26h)"
        priority: P1
        depends_on: [DEBT-200]
        note: "186 testes search_cache — mock pattern critico"
      - id: DEBT-207
        title: "Backlog DB Governance e Naming (P3, 16.5h)"
        priority: P3
        note: "Backlog oportunistico, paralelo com DEBT-210"
      - id: DEBT-210
        title: "Backlog DB Performance Optimization (P2-P3, 10h)"
        priority: P2-P3
        note: "Backlog oportunistico, paralelo com DEBT-207"

  track_d_security_wave2:
    name: "Track D — Security + Backend Wave 2"
    agents: [dev]
    stories:
      - id: DEBT-206
        title: "Seguranca — Monitoramento cryptography/SIGSEGV (P0, 4h)"
        priority: P0
        note: "Totalmente independente. Pode entrar a qualquer momento do Sprint 1."
      - id: DEBT-204
        title: "Backend Wave 2 + Banner System (P1-P2, 30h)"
        priority: P1-P2
        depends_on: [DEBT-201]
        note: "pncp_client + cron/jobs + BannerStack. Entra apos DEBT-201 Done."

# ============================================================
# ORDEM DE ENTRADA (SPRINT 1)
# ============================================================

sprint_kickoff:
  simultaneous_start:
    - "[Track A] DEBT-201 — filter/core.py decomposition (P0)"
    - "[Track B] DEBT-202 — Frontend RSC + useSearchOrchestration (P0-P1)"
    - "[Track C] DEBT-200 — Quick Wins DB + A11y (P2-P3)"
    - "[Track D] DEBT-206 — SIGSEGV monitoring (P0, 4h — rápido)"

  sprint_2_unlocks:
    - "[Track C] DEBT-203 — apos DEBT-200 Done"
    - "[Track D] DEBT-204 — apos DEBT-201 Done"
    - "[Track B] DEBT-205 — apos DEBT-202 Done"

  backlog_parallel:
    - "[Track C] DEBT-207 + DEBT-210 — paralelos entre si"
    - "[Track A] DEBT-208"
    - "[Track B] DEBT-209"

# ============================================================
# QUALITY GATES
# ============================================================

quality_gates:
  per_story:
    - step: "@dev completa — todos checkboxes marcados"
    - step: "@qa roda pytest / npm test — zero regressions vs baseline"
    - step: "@devops cria PR e push para main"

  regression_baselines:
    backend: "7656 pass (run_tests_safe.py --parallel 4)"
    frontend: "5733 pass (npm test)"

  critical_gates:
    filter_decomposition:
      gate: "283 testes filter_*.py passam SEM mudanca de import"
      agent: qa
    search_cache_decomposition:
      gate: "186 testes search_cache passam. Mock pattern: patch supabase_client.get_supabase"
      agent: qa
    landing_rsc:
      gate: "Lighthouse CI LCP < 2.5s (mobile 4G). Hydration intacta."
      agent: ux-design-expert
    rollback_scripts:
      gate: "Testados em staging com dados sinteticos ANTES de producao"
      agent: data-engineer

  epic_success_metrics:
    - metric: "Maior arquivo backend (LOC)"
      baseline: 4105
      target: 1500
    - metric: "Modulos > 2000 LOC"
      baseline: 5
      target: 2
    - metric: "Paginas auditadas WCAG"
      baseline: "5/22"
      target: "15/22"
    - metric: "Landing LCP mobile 4G"
      baseline: "~3.5s"
      target: "<2.5s"
    - metric: "Feature flags com teste on/off"
      baseline: "~80%"
      target: "100%"
    - metric: "Testes backend"
      baseline: 5131
      target: 5300
    - metric: "Testes frontend"
      baseline: 2681
      target: 2750
    - metric: "Tabelas criticas com rollback"
      baseline: "0/5"
      target: "5/5"

# ============================================================
# ACTIVATION INSTRUCTIONS
# ============================================================

activation_instructions: |
  Para ativar este squad:

  1. Voce ja esta aqui. As 11 stories foram criadas em docs/stories/story-DEBT-2*.md

  2. Para comecar implementacao (Track A, P0 critico):
     - @dev: "implementar DEBT-201 — filter/core.py decomposition"
     - Use workflow: brownfield-service.yaml
     - Facade pattern obrigatorio em filter/__init__.py

  3. Para comecar implementacao (Track B, P0-P1):
     - @ux-design-expert + @dev: "implementar DEBT-202 — frontend RSC islands"
     - Use workflow: brownfield-fullstack.yaml

  4. Para comecar implementacao (Track C, DB first):
     - @data-engineer: "implementar DEBT-200 — quick wins DB + a11y"
     - Use task: db-apply-migration.md

  5. Para DEBT-206 (P0, 4h, independente):
     - @dev: "implementar DEBT-206 — SIGSEGV monitoring script"
     - Pode entrar em qualquer momento do Sprint 1

notes:
  - "NUNCA rodar full pytest single-process no Windows — usar run_tests_safe.py --parallel 4"
  - "Filter decomposition: Facade via filter/__init__.py. from filter import X continua funcionando."
  - "Cache decomposition: patch supabase_client.get_supabase (nao search_cache.get_supabase)"
  - "Rollback scripts: testar em staging com dados sinteticos ANTES de aplicar em producao"
  - "Railway deploy: nunca rodar railway up de dentro de backend/ ou frontend/"
  - "Commits por mudanca atomica: um submodulo por commit durante decomposicoes"
