# =============================================================================
# Backend project configuration
# =============================================================================

# -----------------------------------------------------------------------------
# mutmut — Mutation Testing (STORY-6.6)
# Runs weekly in CI via .github/workflows/mutation-testing.yml
# NOTE: mutmut does NOT support Windows natively (issue #397).
#       Run locally inside WSL or use the CI workflow.
# -----------------------------------------------------------------------------
[mutmut]
# Comma-separated directories/files to mutate
# Using directory form so mutmut recurses into sub-modules
paths_to_mutate=filter/,llm_arbiter/,consolidation/,quota/
tests_dir=tests/
runner=python -m pytest -x -q --timeout=30 --ignore=tests/fuzz --ignore=tests/integration
